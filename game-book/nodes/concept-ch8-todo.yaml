content: >-
  ## ~~Farthim Local Leaders~~ ✓ RESOLVED

  Gorven (elder), Amalia (hunt master + lore keeper), Marx (quartermaster). NPC nodes created.


  ## ~~E05: Engagement Sequence~~ ✓ RESOLVED

  Three-part chain created: enc-ch8-05a (hunting party), enc-ch8-05b (old garrison), enc-ch8-05c (Gullux comes down).
  Bronik commands the garrison; Gullux retaliates in 05c. Each leads to the next.


  ## ~~Farthim Estarans~~ ✓ RESOLVED

  All twelve named and written: Cresael (leader), Tarliel, Verael, Kemiel, Motiel, Casius, Cellius, Vasor, Zasais, Taor,
  Kaus, Rael. NPC nodes created.


  ## Dead Feywild: Dungeon Layout

  Torma's lair in the dead Feywild (enc-ch8-06) has no map or layout. The aesthetic is established (cold, grey, frost on
  a corpse), but the actual rooms, hazards, and encounter flow are TBD.


  ## The Merge: Visual and Mechanical Description

  What the Cetyri merge looks and feels like from the outside has not been decided. It should be significant and
  strange. Questions:

  - Is it an action the party takes, or something Cetyri does alone?

  - Is there any risk or cost, even if small?

  - What does Cetyri look and feel like after?


  ## E04: The Town — Farthim Scene

  The party has arrived and met a few residents. The next session will involve deeper engagement with Farthim: meeting
  Gorven, Amalia, and Marx; learning what happened with the Twelve; hearing about the giant siege. This scene needs to
  be written up as an encounter node.


  ## E06: Torma's Realm — Full Write-Up

  The dungeon encounter node exists as a placeholder. Needs the full layout, room descriptions, hazards, and climax once
  the dungeon design is decided.
