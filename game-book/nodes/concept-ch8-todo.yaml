content: >-
  ## The Dead Forest


  location-dead-forest exists as a stub. Specific hazards, the rift the party uses to enter the dead Feywild, and any
  set-piece encounter inside the forest are TBD. This is also the path on which the party encounters this world's
  Cetyri.


  ## Torma — Stat Block and Tactics


  Torma the Ancient (Ancient White Dragon) needs a stat block and combat plan. She may use the hatchling Cetyri as
  leverage. How she fights, speaks, and uses the dead Feywild around her is TBD.


  ## Dead Feywild: Dungeon Layout


  Torma's lair in the dead Feywild (enc-ch8-06) has no map or layout. The aesthetic is established (cold, grey, frost
  on a corpse). Rooms, hazards, and encounter flow are TBD.


  ## Cetyri's Merges


  What the Cetyri merge looks and feels like from the outside has not been decided. Questions:

  - Is it an action the party takes, or something Cetyri does alone?

  - Is there any risk or cost, even if small?

  - What does Cetyri look and feel like after?

  - This is the first of multiple merges across the campaign — establish a pattern here.


  ## Frost Giant Leader / Shaman


  Garrison ground floor (enc-ch8-05b, sub-area B) calls for a frost giant leader and possibly a shaman to anchor the
  great-hall fight. Stat blocks TBD.


  ## E04: Farthim Scene


  The party has arrived and met a few residents. The next session involves deeper engagement: meeting Gorven, Amalia,
  and Marx; learning what happened with the Farthim Estarans; hearing about the giant siege; potentially recognizing the Aerus
  glyph in the Projector Hall. The encounter node needs to be fleshed out for this beat.


  ## E06: Torma's Realm — Full Write-Up


  The encounter node exists as a placeholder. Needs the full layout, room descriptions, hazards, and climax once the
  dungeon design is decided.
