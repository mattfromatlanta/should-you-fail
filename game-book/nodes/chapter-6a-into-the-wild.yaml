id: chapter-6a-into-the-wild
type: chapter
name: "Chapter 6a: Into the Wild"
tags: [chapter, feywild, cetyri, xilo, egedzoo, ozevriel, milicent-research]
status: complete
summary: Party pursues Cetyri into the Feywild, convinces him to commit to the cause, discovers Ozevriel's memorial and Milicent's observatory, meets Xilo and agrees to slay Egedzoo.
content: |
  Upon returning to Naeliste, the party discovered that Cetyri and Bronik had fled into the
  Feywild. Lomani Nae's careful questioning had revealed she understood the truth about Cetyri's
  world-spanning soul, and the young dragon ran to protect that secret.

  The party pursued them through the Faedwood into the Feywild's scorched wasteland—outer regions
  devastated by ancient Estaran invasion. After encounters with hobgoblin bandits and a tense
  meeting at Rinick's Diner with Twi'Xu (Animal Lord and lieutenant to Xilo)—where they also
  learned of the Blue Dragon Egedzoo—they tracked Cetyri to the settlement of Qu.

  Through honest conversation, the party convinced Cetyri to stop running and accept his role in
  stopping the Estarans. Understanding the survival of all worlds is at stake, Cetyri committed
  to the cause.

  Hoping to gain Xilo as an ally and connect to their fey roots, the party commissioned an
  airship deeper into the Feywild. Mid-flight, they were attacked by Egedzoo, the adult blue
  dragon seeking to rule the wasteland. Though they repelled the attack, their airship crashed
  near a mysterious tower structure.

  The tower proved to be the memorial tomb of Ozevriel, the Rebel Fey hero slain in the first
  rebellion against the Estarans. The party defeated the trapped demons and ascended to the top
  of the tower. Here they discovered Ozevriel's tomb was created at the base of Milicent's
  ancient lab. They encountered Hootini there and spent a few hours thoroughly reviewing
  everything they could find—critical research on the Estarans and cross-world transit theories
  developed with Yrk. Hootini then let them know that Xilo had arrived and was waiting back at
  the airship.

  Xilo was pleased to meet them and supports their grand quest. To begin, he asked them for help
  slaying Egedzoo. The dragon is building power in the wasteland and must be stopped. The party
  agreed.
