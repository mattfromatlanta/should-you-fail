summary: Milicent brings the party to a sealed chamber containing a captive Estaran; through this prisoner, they learn the truth: the Estarans have destroyed the Material Plane 54 times before.
content: |
  Milicent leads the party to a sealed chamber deep in her fortress. Inside: an imprisoned
  Estaran—the first any of them have seen in person. Through this captive, the full horror
  of the Estaran threat is revealed:

  - The Estarans have destroyed and recreated the Material Plane 54 times before
  - Each time a rebellion threatened their empire or a Dragon Singularity emerged, they
    enacted their "Last Resort"—annihilation of the universe, followed by reconstruction
    under absolute control
  - The current world is the 55th iteration
  - The Estarans are preparing to do it again

  This revelation explains: the Aboleth's question about "how many moments," the fragmented
  memories of veterans like Aldrin, the Testament of Embers, and why Milicent has spent
  centuries building an army.
