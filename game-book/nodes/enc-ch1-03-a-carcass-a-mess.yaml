tags: [chapter-1, exploration, faedwood, investigation, dragonborn-evidence]
status: complete
summary: The party finds evidence of the Dragonborn invaders—a trail of destruction along the Faepath indicating a large armed force passed through.
content: |
  Environmental storytelling encounter on the Faepath. The party discovers the aftermath of
  Dragonborn passage: slaughtered animals, trampled vegetation, discarded equipment. The scale
  of the force (fifty warriors) becomes apparent. First concrete evidence of the invasion.

  Loot found at The Nest waypoint: Potion of Comprehension, Potion of Healing.
