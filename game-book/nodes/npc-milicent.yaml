summary: >-
  Former Rebel Fey Lady of the Moon, architect of the Dragon Singularity plan, and the party's uneasy ally since Chapter
  5.
player_content: >
  Milicent is one of the oldest living things on Aerus. She was there when the Estarans arrived. She watched them teach
  mortals to build cities and call it kindness, while the Fey fought and died in the Faedwood. She has been fighting
  them, in one form or another, for two thousand years.


  She is a scholar first. What sets her apart from the other Rebel Fey — what always set her apart — is that she thinks
  in systems. She studies patterns, causes, and consequences with a patience that most beings cannot sustain across a
  century, let alone two millennia. That mind is what eventually unlocked the truth: that the Estarans have done this
  before, fifty-four times, and that there is exactly one weapon in existence they have never found an answer to.


  She is not warm. She is not cruel either — cruelty implies feeling. What she is, is certain. She made a decision long
  ago about what the cosmos requires and has spent centuries engineering the conditions to deliver it. The Dread Legion,
  the Shadow Projector, the century she held Cetyri — none of it was passion. It was preparation. She is capable of
  treating the suffering of individuals, including people she respects, as an acceptable cost of the work.


  Since Chapter 5 she is the party's ally, and she takes that seriously in her own way. She will keep her word. She will
  not bend the plan to spare them. She expects the same in return.
dm_content: >
  **She is a scholar.** This is not incidental — it is why she succeeded where the other Rebel Fey did not. She studied
  the Estarans the way a naturalist studies a predator: patiently, without sentiment, looking for the structural
  weakness. She found it. See concept-milicents-plan.


  **Soul damage was deliberate.** The century of Cetyri's imprisonment was not captivity for its own sake — she was
  preparing his soul in the precise way the Dragon Singularity requires. The party does not know this. If they piece it
  together, treat it as a major reveal. She has never apologized for it and will not.


  **Why Cetyri.** She spent decades thinking about Varkhasia — about what happens when something that powerful wins —
  and decided the champion had to be a golden dragon or not at all. That choice is the most human thing about her, and
  she would not describe it that way.


  **She still carries Ozevriel.** She will not show it.


  **The Estaran prisoner.** She holds a captive Estaran in a sealed chamber in her fortress — her primary intelligence
  source on the empire's structure, the 54 resets, and the persistent Estaran fear of Dragon Singularities. The party
  has met this prisoner. They do not yet know the full scope of what Milicent has learned from them.


  **The Erol bond.** Their relationship has history that has not yet been fully explored. To be developed.


  **Trust posture.** The alliance is transactional. She trusts the party to execute the plan; she does not love them,
  and she will not bend the plan to spare them.
