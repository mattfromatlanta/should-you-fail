id: event-erol-and-aldrin
type: event
name: "Erol and Aldrin: The Centuries Between"
audience: dm-only
summary: >-
  The centuries-long arc of Erol and Aldrin — friendship before the Second Fey War, joint conscription through their
  bond, the strain that has remained, and Erol's eventual retreat to the Teeth where Lamat joined her.
status: ongoing
