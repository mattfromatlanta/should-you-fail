player_content: ""
dm_content: >
  Adult white dragon. Torma's older son, older than Bronik by a matter of hours. He is the monster between the two
  brothers — cruel and sadistic, a bully in his mother's image. He likes to be feared for his strength and sees smaller
  creatures as playthings. He will not bother with conversation beyond taunting his prey.


  He has made his nest in the rafters of the old Estaran garrison's great hall, 100 feet above the floor, using the
  Estarans' high western entrance to come and go.


  If the party meets him there he will fight ferociously, likely to his death, taunting them in Draconic — frequently
  announcing himself: "I am Gullux the Terror; I will freeze you and eat your icy guts."


  ## Session 1 — Sighting


  Babas spotted something vast move briefly in the far distance from the air, then blend back into the snow. The party
  does not yet know this was Gullux.
