id: npc-gullux-ice-world
type: npc
name: Gullux (Ice World)
summary: >-
  Young white dragon, CR12; Torma's older child and the steadier of the two dragon lieutenants; leads the raids on
  Farthim's hunting parties.
status: alive
tags:
  - white-dragon
  - ice-world
  - antagonist
  - chapter-8
  - multiworld
content: >-
  The ice world's iteration of Gullux — on the party's home world, Gullux was slain in Chapter 1. Here he is a young
  white dragon and Torma's older child, serving as her most dangerous mobile asset.


  Steady and disciplined compared to his brother. Flies point on the raids. The village of Farthim has learned to dread
  him. He knows the valley terrain well after months of raiding and will use it against the party.


  CR12.
