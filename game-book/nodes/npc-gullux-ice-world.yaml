content: >-
  Young white dragon, CR12. Torma's older child and the steadier of the two dragon lieutenants. Leads raids on Farthim's
  hunting parties, using the glaciers and blizzards to ambush hunters who venture too far from the Shield boundary.


  Gullux is large enough to blend into the snowscape at distance — he is almost impossible to distinguish from the
  terrain when he is still. He is patient and calculating in a way his younger sibling Bronik is not.


  ## Session 1 — Sighting


  Babas spotted something vast move briefly in the far distance from the air, then blend back into the snow. The party
  does not yet know this was Gullux.
