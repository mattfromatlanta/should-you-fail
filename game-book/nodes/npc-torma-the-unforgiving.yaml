summary: >-
  Adult white dragon on Aerus; mother of Gullux and Bronik; came to the Uplands seeking her stolen eggs; slain by Erol
  and Lamat at the end of Chapter 2. An iteration of the same dragon as Torma the Ancient on Ikellor.
player_content: ""
dm_content: |
  Adult white dragon. Mother of both Gullux (traitorous) and Bronik (loyal). Gullux betrayed her
  by stealing dragon eggs from her clutch. Sent Bronik to find the stolen treasure and eggs.
  Attacked at the end of Chapter 2 and was killed by Erol and Lamat.

  Treasure stolen by Gullux included adamantine armor and a flaming sword once owned by Garrik
  the Bold, a challenger she had defeated and killed.
