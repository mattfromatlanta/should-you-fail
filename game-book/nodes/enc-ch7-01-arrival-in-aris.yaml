name: "Ch7 E01: Arrival in Aris"
tags: [chapter-7, roleplay, aris, young-bastards, veterans, de-escalation]
status: complete
summary: The party arrives in Aris with their entourage, de-escalates a near-lethal confrontation between Veterans and Young Bastard protesters on the road in, and is met at the gate by Twi'Xu who leads them to the High Ward.
content: |
  The party made their way into Aris after a month on the road, stopping in Naeliste and
  Oechenfor along the way. Traveling with them: Xilo, Bronik, and Cetyri.

  On the approach to the city gates, they came upon a confrontation between a group of
  Young Bastard protesters and a trio of Veterans. The situation had escalated quickly —
  the Veterans were armed and ready, and would likely have killed the protesters if the
  fight had broken out. The party intervened and talked it down before blood was shed.

  Twi'Xu was waiting at the gate. He had been sent ahead to make arrangements and had
  secured guest accommodations in the High Ward, where dignitaries are typically housed.
  He led the party in.
