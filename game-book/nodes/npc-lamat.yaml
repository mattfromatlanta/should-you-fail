summary: >-
  Veteran of the Rebellion and co-Founder of Oechenfor and Lome; founded the Orchard Path Monastery; partner to Erol.
player_content: >
  A veteran of the Rebellion and one of the Founders of Oechenfor, and Erol's life partner. With Erol he co-founded
  Lome five years ago, and earlier founded the Orchard Path Monastery, where he mentored F'zuga. He and Erol keep an
  Eladrin-style manor atop the Teeth above Lome. Where Aldrin's sense of order is built from external structures of
  duty and institution, Lamat's is built inward — a discipline of the self rather than of the world.


  In Chapter 2 he disappeared after discovering Milicent had targeted him. He returned with Erol at the end of that
  chapter to help slay Torma, then led the people of Lome south to Oechenfor.
dm_content: >
  **Practical detail.** He left behind in the manor at Lome: Wraps of Unarmed Power +1, 100pp, and 5 rubies (200gp
  each). Available if the party returns to the manor.
