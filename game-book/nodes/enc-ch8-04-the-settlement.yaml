summary: >-
  The party makes contact with Farthim — shock, then the assumption that the Estarans sent them; learns the village's
  two perils (food and frost giants), explores the empty Generator and Projector Halls, and gathers the rumors that
  will push them east toward the garrison.
content: |
  Picking up where Session 1 left off: the party has scouted Farthim and pulled back to plan. Now they make contact.

  ## First Contact

  When the party enters the town center, the Farthimers' reaction comes in two waves.

  **Wave 1 — Shock.** Strangers do not arrive in Farthim. They haven't in living memory. People come outside cautiously,
  staring. The presence of Fey (Sylvaris, Aelira) deepens the shock to something more uneasy — Fey are remembered
  here as the destroyed enemy of the Estarans, dangerous creatures who supposedly brought the ice age on themselves
  three centuries ago. Seeing them alive, and apparently allied to the Estarans' messengers, does not compute.
  Children point. Adults go quiet. Someone fetches Gorven.

  **Wave 2 — The conclusion.** Within minutes, the shock resolves into a single conviction: *the Estarans sent them.*
  This is not phrased as a question. It is stated as relief. Faces change. Tears, embraces, an old hunter dropping to
  one knee. Gorven himself will speak it carefully, but the rest of the village will treat it as obvious. **The party
  cannot easily deny this.** Denial sounds like a lie or a quitter's talk — and the Farthimers have already buried a
  hundred people in the past year. They need this to be true.

  Let the party feel the weight of being mistaken for saviors. They can correct the record, but it will not stick on
  the first try.

  ## The Two Perils

  Once contact is made, Gorven, Amalia, and Marx will lay out Farthim's situation. There are two threats and they
  compound on each other:

  - **Food.** The Shield collapsed a year ago. The farms are gone. The village survives on hunting and on what
    little they've coaxed from the whaling camp. Neither is working. Hunting parties are ambushed by frost giants
    before they can land game. Whaling on a frozen sea requires skills they don't have and tools they barely
    understand. Marx can give the precise count: at current rates, Farthim has weeks, not months.

  - **Frost Giants.** Hunting parties driven off or killed. The giants have not crossed into the ring boundary in the
    year since the Shield fell — but they patrol the valley east of town and intercept anything that ventures out.

  The village's plea will be specific: break the giant siege so they can hunt. They are not asking the party to feed
  them — they are asking for the chance to feed themselves.

  ## What Farthim Knows and Suspects

  Through Amalia (the lore keeper) and Gorven (the elder), the party can learn:

  - The history of the Fey War (mythologized) and the death of the Feywild (only half-remembered; see
    location-ice-world and location-farthim for what the village believes vs. what is true).
  - The Farthim Estarans (Cersael's Section) who maintained the Shield. The withdrawal a year ago. The three camps of belief about what
    happened (they left / they were taken / they were driven away).
  - **The Garrison.** Five centuries ago Farthim used to supply the wartime garrison north-east of town. No
    Farthimer has been there in generations, but the collective memory persists: it is a structure of incredible
    architecture, built for a thousand, abandoned after the Fey War. The townsfolk now suspect the giants have taken
    it over — the patrols come from that direction.
  - **A white dragon.** Some Farthimers claim to have seen a white dragon working with the giants. They speak of one
    dragon, singular. (DM: there are two — Gullux and Bronik. The village has only ever glimpsed one of them from a
    distance.)
  - **What the village believes about the Fey.** Farthimers know the Fey existed and that the Estarans destroyed
    them in the Fey War. The settled story is that the Fey were dangerous, untrustworthy, and brought their end on
    themselves — *"look what they did to the world."* The ice age is read as proof. Meeting living Fey (Sylvaris,
    Aelira) should put quiet pressure on that story; Amalia will feel it first.

  ## The Estaran Structures

  Both Estaran buildings are abandoned and intact. Both are treated with reverence. Neither is locked — the Farthimers
  simply do not enter them. The party can.

  - **The Generator Hall.** The barracks and operations of Cersael's Section. Truly empty. No notes, no logs, no personal
    effects, no working machinery. The Estarans took everything portable. What remains is the architecture itself —
    austere, disciplined, the negative space of twelve lives that left no trace. The Shield mechanism is gone or
    inert; there is nothing here for the party to operate.

  - **The Projector Hall.** Empty of equipment as well — but the **star chart** is embossed into the walls. Three
    Estaran worlds are named in Estaran runes, with route lines connecting them:

      - **Aerus** — which the party should recognize
      - **Maydor** — unknown
      - **Ozarrid** — unknown

    Estaran is the formal ancestor of the common tongue; a common speaker can decipher the runes with a DC 10
    Intelligence (study) check. The party can read the names off the wall and copy what they need. This is the first
    visual sense they get of the Estaran network they have stepped into.

  Neither structure offers technology or weapons. The Estarans were deliberate about leaving nothing portable behind.

  ## Where This Leads

  Two natural threads pull the party forward:

  1. **East toward the garrison** (via the valley). Any foray east of Farthim risks contact with frost giant patrols.
     Hunting parties end this way; the party will end this way if they head for the garrison. This is the trigger for
     enc-ch8-05.

  2. **West to the whaling camp** (optional). If the party would rather try to feed the village than break the siege,
     they can travel west to where the river meets the sea. Tools and small craft are there. This is a side path; not
     the main thread.

  ## DM Notes

  - The Farthimers' conviction that the party are Estaran emissaries should be played gently but firmly. The party
    can disabuse them, but it will take effort, and even then the village will look for any sign that they're being
    lied to for kindness.

  - Don't rush the lore. Amalia is the bridge between the party and the real history of the world. Let her tell what
    she knows; let the party find the gaps.

  - The white dragon rumor sets up the Gullux/Bronik reveal at the garrison. Let it stay singular here — the party
    will be surprised to find two.

  - The Radiant Lance must not be openly displayed. If a townsfolk recognizes it as Estaran (which they will if it
    is shown), it will deepen the "you were sent by the Estarans" conviction and could become awkward to walk back.
    DM judgment on whether to plant this beat.

  ## Session 1 — Where Things Stand (recap)

  Babas's aerial survey identified the ring (Shield boundary, one mile from town center), the frost giant scout
  retreating north, and something vast in the distance (Gullux). Sylvaris scouted ahead, saw three humans and a
  goliath clearing snow and a family huddled around a fire. The party pulled back to plan. Session ended there —
  E04 continues next session at first contact.
