summary: >-
  The party returns to Naeliste to find Cetyri gone—he fled into the Feywild with Bronik after realizing Lomani's
  examination revealed his multiverse-spanning soul.
player_content: ""
dm_content: >
  While the party was south with Eigitch, Cetyri recovered rapidly in Naeliste under Lomani Nae's (he) care. His sight
  returned, and by every visible measure he was a living dragon again. Seeing this, Lomani made the mistake of asking
  Cetyri directly about the radiance discovered in the Chapter 3 examination. Dragon-soul multiplicity is something
  dragons keep from every other race — only the Estarans know it, and only from experience. The question alone was a
  violation of a closely guarded secret.


  The party returns to Naeliste after their alliance with Milicent, expecting to continue working with Cetyri. Instead:
  he is gone. Lomani explains what happened. Cetyri fled into the Feywild in a panic. Bronik accompanied him out of
  simple loyalty and friendship, not fully understanding why they were running. The party is only a day or so behind
  them.
