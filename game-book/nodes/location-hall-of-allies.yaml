summary: >-
  The seat of government for the Allied Cities; formerly an Estaran command nexus; the highest structure in Aris;
  home to Gallifax's lair and Maelric's trance-throne.
content: |
  The Hall of Allies occupies the highest of Aris's seven hills. It was the original Estaran command nexus
  for the region — a structure of alien geometry and radiant materials, now partially reclaimed and
  repurposed by the Allied Cities as the seat of government for the Counsel of Citizens.

  Its vast central chamber is large enough to house Gallifax comfortably. His lair is here, and here
  Maelric Sturmwald sits in his trance-throne, held in his unresponsive state since before the party arrived.

  Guards are normally posted but many were drawn out during the riot. When Gallifax leaves the Hall to
  stop the violence, Maelric is left alone and the Hall is effectively unguarded.
