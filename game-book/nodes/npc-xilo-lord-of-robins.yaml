status: alive
summary: >-
  One of the seven original Rebel Fey; an Animal Lord who is, literally, a robin; quick-witted envoy to Aris and now to
  Metgal; sworn philosophical ally of the party.
player_content: >
  One of the seven original Archfey who fought the Estarans in the First War, and an Animal Lord — he is, literally, a
  robin, though he moves between a small bird form, a hybrid form, and a humanoid form as it suits him. He carries the
  personality of a songbird: quick, bright, restless, energetic. From the Ode to Seven Lords: "Joy beneath the thorn,
  taught the lost to win."


  Xilo understands what the party often struggles to: that without Milicent's drastic measures, the Estarans would
  never have been driven away in the first place. He worries about the Feywild's weakened state — both Ozevriel and
  Milicent are absent now, and the realm feels their absence. He maintains his own intelligence through agents like
  Twi'Xu, Lieutenant of Bluebirds. Erol serves him as warlock.


  After the party slew Egedzoo in Chapter 6b, Xilo gave them safe passage back to the mortal world, gifted a Feywild
  Compass, and volunteered to accompany them to Aris as an envoy — the first Fey lord to set foot in the mortal
  capital. The Rebel Fey have no single ruler; Xilo speaks for himself and carries influence among the five active
  Rebel Fey, but he makes no binding pledges on their behalf. Fey are immortal and do not make unbreakable promises.
  His travelling with the party is a gesture of goodwill, not an oath. While in Aris he has been building a network of
  useful contacts for the future.
dm_content: >
  **Running Xilo.** Songbird energy — short attention, sudden focus, never still in any form. He speaks for himself
  only and will sidestep any attempt to extract a Rebel Fey commitment. Goodwill yes, oath no.
