content: >-
  The warrior of the Twelve. Patrolled Farthim's perimeter and held the frost giants at distance. Rarely spoke to
  residents but was a constant visible presence on the ridgelines.


  Children grew up knowing that if you could see Verael's silhouette against the sky, the town was safe. Her absence is
  one reason the frost giants have grown bolder in the past year.
