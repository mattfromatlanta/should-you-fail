content: >-
  A settlement of humans, dwarves, and goliaths in a valley adjacent to a frozen river on the ice world. Once a town of
  800. A year ago, a hundred remained. Now there are 65 — the rest lost to cold, starvation, and giant raids. Many of
  the survivors are weak and malnourished. They survive by hunting large game (mammoths, woolly rhinoceroses, giant elk)
  and attempting to whale on a frozen sea, though they lack real skill in either.


  When the party arrives, the village's first question: "Did the Estarans send you?" They do not know whether to be
  hopeful or terrified by the answer. The town's deep hope — spoken or unspoken — is that the party has come to restore
  the Shield. Expect that hope to attach itself to the party immediately.


  Most townsfolk will argue that anyone who says the Estarans aren't coming back is a liar or a quitter who wants to
  die.


  ## Fey in Farthim


  Sylvaris and Aelira — both Eladrin — will be a shock. To the people of Farthim, Fey are myth, creatures from a world
  that no longer exists. Meeting living Fey is the first thread that pulls toward the real history: what the Feywild was,
  how it died, and why the world has been cold for three centuries.


  The common tongue is spoken here — strange accents, but understandable. The Estarans spread it throughout the cosmos.
  Fey languages are not spoken in Farthim and no one here can read them. The frost giants, however, are former Fey —
  they speak Elvish and Giant.


  ## The Valley


  Several landmarks outside the town are known to Farthimers:


  - **The River** — A frozen river runs through the valley. Farthim sits close to it; it passes through the old Shield
  boundary and leads south to a sea roughly twelve miles away.

  - **The Whaling Camp** — At the river mouth on the sea is an ancient whaling camp, in regular use before the ice age.
  The Farthimers have tried to work it in the last year but lack the skill. Whaling on a frozen sea is dangerous and
  they have not solved it.

  - **The Garrison** — Five miles north and west, in the mountains, is an ancient Estaran garrison built for a thousand
  soldiers. Abandoned after the Fey War and empty for a century until the last month, when Gullux and Bronik forced the
  frost giants to occupy it.

  - **The Dead Forest** — Adjacent to the garrison. A vast forest that died when the Feywild collapsed. Many rifts to
  the dead Feywild remain open here. Torma entered the dead Feywild through this forest thirty years ago. It is
  extremely dangerous — full of monsters and demons of the cold.


  ## The Shield and Its Collapse


  When the ice age began, the Estarans erected a magical force barrier — called the Shield — roughly one mile in radius
  around the town center. Inside the Shield, the climate remained hospitable: warm enough for farms, for green, for
  ordinary life while the world outside froze solid. Farthim thrived within it.


  When the Estarans left, the Shield failed. The cold came in immediately. The farms died. A ring of ruined farmland
  still marks the old boundary — frozen furrows, dead orchards, collapsed outbuildings — visible evidence of what was
  lost. Every living Farthim resident remembers the green, the soil, the warmth. That memory is still fresh and raw.


  ## The Estaran Disappearance


  The Estarans did not leave gradually. One day they were there; the next they were gone. The strange detail everyone
  remembers: the entire village awoke simultaneously in the middle of the day — not from sleep, but as if returning to
  awareness — and the Estarans had simply vanished. No warning. No farewell. No sign of struggle.


  There is no consensus on what happened. Three camps exist in Farthim:

  - **They left.** The Estarans finished whatever they came to do and departed. They were never invested in Farthim,
  only in their own work.

  - **They were taken.** Something powerful enough to remove an Estaran presence overnight came for them.

  - **They were driven away.** Some force caused them to flee — the giants and the dragons, perhaps. Or something worse.


  > **DM NOTE:** The Estarans were recalled by Central Command. Outposts across multiple worlds are being pulled back to
  fortify core Estaran positions ahead of an existential reset in the Estaran core. This was an ordered withdrawal — the
  village's fear and speculation are based on incomplete information.


  ## Estaran Structures


  Two notable Estaran buildings remain in town, abandoned and intact:


  - **The Generator Hall** — housed the mechanism powering the Shield. The machinery is present but inert. Nobody in
  Farthim understands how it worked.

  - **The Projector Hall** — housed a radiant projector. Diagrams on the walls depict three other Estaran worlds. The
  townsfolk have lived with these images for years without understanding them; to the party, the connection to the
  Radiant Lance and the broader Estaran network should become clear. World names are written in Estaran runes, but the
  diagrams are detailed enough that the runes can be copied for later translation.


  Both structures are treated with reverence and unease. They are not looted.


  Local leaders: Gorven (elder), Amalia (hunt master and lore keeper), Marx (quartermaster).
