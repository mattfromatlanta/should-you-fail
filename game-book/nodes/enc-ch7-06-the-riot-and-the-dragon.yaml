summary: >-
  The illusion collapses; the riot erupts. The party navigated the chaos, found and convinced Nava to come with them,
  and met Ekert Shae. Session ended with Gallifax spotted flying low over the city — Maelric now unguarded.
session_recap: |
  Aelira identified the illusion immediately via her Robe of Eyes (truesight). The party was skeptical from the
  start — the Estarans have no reason to physically return to this world.

  Veterans were not so lucky. Many suffered painful psychic episodes on seeing the Estaran warriors. Erol was hit
  hardest. Aldrin abandoned the rally to protect her. Other Veterans fled in terror. Babas approached Erol to
  offer aid; Erol accepted. Together with Babas she theorized that the crippling effect may be deliberate Estaran
  tampering — a mechanism to suppress Veterans should they ever try to rebel.

  When the illusion collapsed and the Young Bastards' citywide demonstration began, the Veterans were furious.
  Aelira and Cormin used spells to slow some down and compel them to think. Beacon made a compelling case.
  A few Veterans were convinced and agreed to go out and rally their own for calm.

  Aldrin, when asked to lead the city's response, said he didn't care. His attention was entirely on Erol. He
  agreed that finding Nava was probably wise but didn't know where she was.

  The party headed into the city. Cormin used mass suggestion on a group of Young Bastards to lead them to Nava.
  A trio of Veterans tried to start a fight but were turned back through fear and intimidation — no one hurt.

  The party found Nava in a safehouse, and met Ekert Shae for the first time. Ekert was skulking and unhelpful,
  quietly looking for his opportunity to steer Nava into mortal danger. Nava was pacing and failing to hold
  herself together — she knew she had caused a disaster. The party convinced her to come with them to find
  Aldrin and Erol, believing the two groups together could help calm the city. Nava agreed.

  As the group prepared to leave, a nearby alchemical storehouse was set on fire and exploded. Then — the rush
  of massive wings overhead. Gallifax, in his full ancient aspect, has left the Hall of Allies. Maelric is
  unguarded. Session ended here.

  CURRENT STATE:
  - Nava Kurn is with the party
  - Ekert Shae is with the party (ring of mind shielding + Obfuscating Daydream active)
  - Aldrin and Erol are at the waterfront plaza; Erol is recovering and resolving to leave Aris
  - Gallifax is flying low over the city in his most fearsome aspect
  - Maelric is alone and unprotected in the Hall of Allies
  - Yrk and Felicity are in the city looking for the party but not yet found
  - Xilo, Twi'Xu, Cetyri, and Bronik are at the city guest house, keeping clear of the chaos
content: >-
  Picks up from the E05 cliffhanger. The Estaran warriors have just descended on Aris at sunset. The party is at the
  waterfront amphitheater, observing.


  ### Veterans Respond (Read Aloud)


  Bells ring out and deep horns echo across the city. Shouting from the avenues leading to the waterfront — at first a
  few voices, then dozens, then a hundred or more Veterans race into the plaza. They are disorganized and the scene
  quickly becomes chaotic. The Estarans continue descending and are now very close.


  Most but not all of the Veterans are armed. Some are struggling to put on ill-fitting armor. A few are shouting orders
  but no one is listening. Then — Aldrin charges in on the back of an armored rhinoceros. He halts at the leading edge
  of the ragged crowd. Eyes flock to him. He draws his famous long blade and calls the Veterans to rally. Some call out
  with pride, but the response is less enthusiastic than expected. Fear has gripped them.


  Erol arrives by misty step. She has the aspect of an electrical storm in winter — none of the party have ever seen an
  Eladrin in a state like this. The depth of her power, only hinted at before, is now undeniable. An Estaran touches
  down and blazes with radiant energy. He turns to Erol and squares with her. Then she seems to freeze. She grabs the
  sides of her head and cries out in agony. She falls to her knees.


  Aldrin sees this and forgets everything else. He charges his mount to put himself between the Estaran and Erol, giving
  a ferocious, primal scream at his enemy. But Erol is not alone — many Veterans are similarly crippled, and some are
  already fleeing in terror. A wave of despair hits the party. The battle is lost before it starts...


  *Pause and collect player responses. Ask for their affective reaction as well as their actions. Play out the first
  moments, then continue:*


  Every Estaran warrior freezes instantly — even suspended in space. The telltale translucency of an illusion. The
  stunned Veterans stare in silence. The plaza is profoundly quiet. Then dry, staccato coughing from the thick of it —
  Erol is recovering. Other affected Veterans regain themselves. Murmuring rises, then incredulous shouts.


  Behind the crowd, away from the river, a single magically amplified voice calls out: *"VETERANS. LOOK AT YOURSELVES.
  YOU'VE ALL GONE TO PIECES."* A symphony of horns and drums picks up. Chanting echoes down city streets: *"MAKE WAY.
  MAKE WAY. MAKE WAY TODAY. FOR EVERY SOUL IS KING."*


  The mood among the Veterans turns to fury. Curses and oaths. *"It's Nava. Has to be. Damn her, and all her damned
  ingrates."*


  Bands of Veterans form and charge off into the city looking for a fight. Crowds of Young Bastard demonstrators pour
  into the streets, chanting with fists in the air. Where Veterans encounter Bastard crowds, bloodshed begins.


  ---


  ### NPC Positions During the Riot


  **Erol and Aldrin:** Erol is completely drained — recovering from an intense psychic strain. Though not yet recognized
  for what it is, this crippling reaction is a method of Estaran tampering designed to prevent Veterans from effectively
  rebelling. She is also spent from the tremendous arcane fury she called up to fight what she believed was an
  existential threat. She won't be much use to anyone for some time. Aldrin is entirely preoccupied with her safety and
  will not leave her, despite his sense of duty to the city. He is surprised at himself. Both are willing to give the
  party advice but neither will join them.


  **Lamat:** Before the riot, at Erol's request, Lamat went ahead to inform Gallifax that the Estarans were back. If the
  party goes to the Hall of Allies before Gallifax leaves on his own, they will find Lamat there — he has failed to get
  the dragon to emerge and isn't sure what to do. By this point, Lamat has pieced together that the waterfront event was
  part of a larger plan. He wants to hear what the party saw, and is considering going back into the city to gather
  clear-headed allies to calm things down.


  **Ardo Manessi:** Ardo is at Aldrin's home, receiving and sending couriers to allies around the city, collecting
  information, and playing the role of deeply concerned citizen. He is reinforcing the image of the thoughtful, moderate
  statesman — the right person to step forward when the dust settles. Only one other person in the city knows what he
  truly plans. That person is with Nava.


  **Nava and Ekert:** Nava can be found with some investigation. She is trying to rally her demonstrators — be brave,
  don't fight unless attacked, represent themselves honorably. In her heart she is despondent. She did not anticipate
  this could happen. Ekert is at her side, consoling her disingenuously and assuring her this isn't her fault. He is
  also subtly steering her toward more dangerous situations — keeping her near the worst of the fighting — on the off
  chance that a furious Veteran will kill her for him.


  **Felicity and Yrk:** If the party goes out into the city to intervene in the riot, they will encounter Felicity and
  Yrk. The two arrived in Aris hours earlier looking for the party and couldn't find them. They have seen Xilo, Twi'Xu,
  and Bronik. They have made a breakthrough — they have a device with them they believe can send the party to another
  world, and they need to talk.


  ---


  ### Gallifax Leaves


  At midnight — five hours into the riot — fires are spreading and there is no sign of the violence abating. Whether
  prompted by others or acting on his own judgment, Gallifax emerges from the Hall of Allies. He goes where the violence
  is worst, alighting between warring bands and demonstrating his crackling fury. He commands Veterans to stand down.
  Those who do not yield, he hurts. He is trying hard to restrain himself.


  This is the moment the assassins have been waiting for. Move to E07.


  ---


  ### DM Notes: Mechanics


  - Each brawl: 2–4 Veterans vs. 2–4 Young Bastards, commoner or guard stats, nonlethal by default.

  - DC 15 Persuasion (advantage with Aldrin, Erol, or Nava present) to de-escalate a confrontation.

  - The streets are difficult terrain; visibility is poor; fires may start in the Living Districts.

  - A DC 12 Investigation check (advantage for anyone who has actually seen Estarans) notices something off about the
  illusion before it collapses — it's too static, lacks full dimensional depth.

  - Detect magic or equivalent immediately reveals it as illusion.
