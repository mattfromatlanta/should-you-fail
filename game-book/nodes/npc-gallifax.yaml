summary: >-
  Ancient bronze dragon, Aegis and Steward of Free People for the Allied Cities; kept vigil over Maelric in Aris
  through Chapter 7.
player_content: >
  An ancient bronze dragon and the protector of the Allied Cities, titled Aegis and Steward of Free People. For
  generations he was allied with the Estara during their rule of the mortal world. The Rebellion changed that: he
  witnessed the Estara unleash the nightmare magic that burned Metgal, was appalled by the cruelty of it, and turned
  against them. His defection was one of the turnings of the war.


  His hoard is modest for a dragon of his age — he values knowledge and historical artefacts over gold, and his lair
  is the Hall of Allies in Aris. Through Chapter 7 he kept strict vigil over Maelric's catatonic body, refusing every
  attempt to reach him by psychic means; he is a steady, conservative presence and treats trust as something earned and
  rarely given. With Maelric restored, that vigil has ended.
dm_content: >
  **Tone in play.** Conservative, weighty, slow to bend. He does not move quickly on new information and does not need
  to. Use him as the ballast in Aris-side political scenes.
