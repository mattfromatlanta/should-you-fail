id: npc-maxxa-twins
type: npc
name: Maxxa'Valien and Maxxa'Volien
tags: [beholder, underdark, chapter-2, twin, shadow-projection]
status: unknown
summary: Rival beholder twins in the Underdark—Maxxa'Valien (perfect and majestic) and Maxxa'Volien (unspeakably deformed)—born when an unknown god's nightmare split in two.
content: |
  Rival beholders occupying opposite ends of an underground canyon in the Underdark below the
  East Hills. Born when an unknown god's nightmare split in two. Maxxa'Valien is the "perfect
  and majestic" twin; Maxxa'Volien is the "unspeakably deformed" twin. They have identical
  fortresses at either end of the underground canyon.

  The party made a deal with Maxxa'Valien to clear creatures from neutral territory. Milicent
  later pulled the party into a shadow projection to fight a transformed (weakened) Maxxa'Valien.
  His ultimate fate after the encounter is not fully documented.
