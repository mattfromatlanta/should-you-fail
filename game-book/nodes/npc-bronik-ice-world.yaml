content: >-
  The ice world's iteration of Bronik — on the party's home world, Bronik has been a companion since Chapter 2. Here he
  is a young white dragon and Torma's younger child, serving as a raiding lieutenant alongside Gullux.


  More erratic and reckless than his brother. Can be impulsive in a fight. The potential weak point among Torma's forces
  — his rashness may be exploitable.


  CR12.
