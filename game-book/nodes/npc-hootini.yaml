summary: Aelira's fey companion; one of the Moon Fey who once served Milicent; found the party at Ozevriel's memorial and guides them through Milicent's research.
content: |
  One of the Moon Fey who once served Milicent before her transformation into the Shadowdame.
  Now bonded to Aelira as her fey companion. Awaited the party at Milicent's observatory atop
  Ozevriel's memorial in Chapter 6a. Guided them through Milicent's research documents.
  Cannot leave the Feywild in physical form; Aelira can summon his spirit once per off-world
  journey.
