player_content: ""
dm_content: |
  Realizing they must go east to find the Trickster, the party cautiously enters Kriv the
  Blacktongue's territory by boat and then land. They arrive at Kriv's lair to find the greatest
  black dragon in the Drekklands is already dead. No explanation left behind.

  The implication—that the ancient goblin they are seeking was responsible—speaks to Yrk's
  power and the lengths he goes to maintain his safety and privacy in this territory.
