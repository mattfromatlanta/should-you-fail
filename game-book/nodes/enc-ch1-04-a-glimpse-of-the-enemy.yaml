dm_content: |
  The party's first direct combat encounter of the campaign. White Dragonborn soldiers have
  posted at The Nest—the stone dome waypoint on the Faepath. The party engages and defeats
  them, getting their first look at the enemy: these Dragonborn speak a crude dialect of
  Draconic unfamiliar to local speakers.

  Loot from invaders' stash: 10 Walloping Arrows.
