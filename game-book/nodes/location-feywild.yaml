summary: Vibrant reflection of the mortal world; home to Fey and the Rebel Fey; outer regions scarred by Estaran occupation.
player_content: ""
dm_content: >
  A vibrant reflection of the mortal world. Home to Fey creatures characterized by intense magical energy. The Rebel Fey
  reside here. Naeliste is located in the Feywild.


  The outer regions — closest to the mortal world — were transformed into Waste during the Second Fey War and Shadow War
  (~400-150 years ago). Centuries of conflict between Estaran order and Fey nature scorched these borderlands beyond
  recovery. Giant thorn vines the size of mountain ranges mark the wasteland horizon. These regions are dead; they will
  not heal.


  The heart of the Feywild is an eternal twilight forest — the primal, untouched state of the realm. The Memorial of
  Ozevriel stands in this forest. This core was protected throughout the wars, though it carries the weight of what was
  lost.


  The Feywild has been structurally weakened since both of its pillars of stability were removed: Ozevriel, killed in
  the Second Fey War, and Milicent, who departed to the Shadowfell ~250 years ago. Without them the realm cannot fully
  heal, even now that the Estarans are gone.
