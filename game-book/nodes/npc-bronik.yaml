summary: >-
  White half-dragon son of Torma the Unforgiving; once an enemy, now a trusted companion; stayed behind with Xilo when
  the party crossed to Ikellor.
player_content: >
  A white half-dragon who rode a wyvern named Dirge. Son of Torma the Unforgiving and brother to the traitorous
  Gullux; he came searching for Gullux and for the stolen treasure after Gullux betrayed Torma by taking dragon eggs.


  The party captured him in Chapter 2, and over time he came to accept them. He was befriended by Peno. He travelled to 
  Naeliste with the party and Cetyri, stayed there with the Goblins while the party sought the Trickster, and when 
  Cetyri fled into the Feywild in panic he went with him out of simple friendship and loyalty. He has been a quiet 
  support to Cetyri ever since.


  When the party crossed to Ikellor at the start of Chapter 8 via the Radiant Lance, Bronik stayed behind in Metgal
  with Xilo, to whom he has pledged service.
dm_content: >
  **Multiworld note.** Bronik is an iteration of the same soul as npc-bronik-ice-world, the true Adult white dragon on
  Ikellor. The party has not yet been told this directly. If Cetyri's nature comes into discussion of soul-spanning,
  Bronik becomes the obvious next question.
