summary: Eigitch's name for the underground river system flowing beneath the Allied Cities; a secret path to the Drekklands protected from Milicent's sight while traveling through it.
content: |
  The underground river system flowing beneath the Allied Cities. Named the "Underwet" by
  Eigitch the Old. Connects Naeliste to the Drekklands—a secret path that is protected from
  Milicent's sight while travelers move through it. Eigitch's submarine "The Rainbow Trout"
  navigates these passages.

  Contains a Kua-Toa village where the Aboleth Lord Mr'Hrm'N'Ahir enslaved Bullywugs before
  being defeated by the party.
