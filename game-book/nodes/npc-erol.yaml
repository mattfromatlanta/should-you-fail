id: npc-erol
type: npc
name: Erol the Faed
tags: [eladrin, veteran, founder, oechenfor, lome, warlock, rebellion]
status: alive
summary: Eladrin veteran warlock, co-Founder of Oechenfor and Lome; was Milicent's warlock until Estaran conscription changed everything; now serves Xilo; returned to slay Torma at end of Chapter 2; currently in Aris supporting Aldrin.
content: |
  Erol is an Eladrin Fey, perhaps the greatest of the Founders of Oechenfor. Female.
  Warlock. Stunning and wild to behold—beautiful, certainly, but her presence is defined
  more by obvious supernatural power than beauty. Only a Fey Lord such as Milicent or Xilo,
  or an ancient dragon, would cast a shadow over her.

  Like all Eladrin, her aspect (Spring, Summer, Fall, Winter) reflects her mood—but Erol is
  unusual. She possesses such natural talent and magical depth that she often appears as a
  blend of aspects, or takes on aspects other Eladrin do not: an Indian Summer, a False
  Spring in January, a morning thunderstorm, a drought in March. Other Eladrin do not
  generally do this.

  HISTORY WITH MILICENT:
  Erol was once Milicent's warlock—the earliest known bond between them. She was conscripted
  by the Estarans before the 2nd Rebellion, taken away to do unknown work for them. This
  conscription renewed Milicent's drive to fight the Estarans; it was while Erol was absent
  that Milicent resolved to found the Dread Legion.

  When Erol returned, she was shocked by what Milicent had become. She surrendered her
  warlock powers and severed the bond. Milicent was heartbroken but let her go. Erol then
  lived a quiet life for a time.

  When the Rebellion began again in earnest, Erol went to Xilo and asked to join his service
  so she could fight the Estarans with her full power. She now serves him as his warlock.

  Later, fearing Milicent would come to conscript her back into service, Erol and Lamat
  disappeared into the Feywild and Shadowfell, moving between refuges.

  VETERAN STATUS:
  Erol is a veteran of Estaran conscription but is far less affected by the lingering Estaran
  magic that mortal veterans experience. She doesn't know exactly why—it may be her Fey
  nature, or something different about the nature of her conscription. Like all veterans, she
  has no distinguishable memory of her service away from this world.

  RELATIONSHIP WITH ALDRIN:
  Erol and Aldrin Stoneward were once partners before she and Lamat grew close. There is
  still deep affection between them. To Aldrin, Erol is the one who got away. Erol admires
  him deeply but always felt constrained in his orbit—he is ultimately a soldier and a
  servant, and his world is structured accordingly. Erol, as a Fey, requires a less
  structured way of life. Aldrin knows this and regrets it, but he is who he is, and Erol
  will not accept him changing himself for her. Lamat has a similarly ordered mind, but
  for Lamat the order is an internal exercise rather than an external one.

  CHAPTER 2 END:
  Returned dramatically to slay Torma the Unforgiving, saving the party. At the bottom of
  the Upland Stair, before leading the Lome refugees south to Oechenfor, she told the party
  to travel to Naeliste and then seek the Trickster (Yrk).

  CURRENT STATUS (CHAPTER 7 — END OF E06):
  In Aris, arrived shortly after Aldrin. Was acting as envoy to local leaders and Citizen Counselors.

  During the E05/E06 illusion event, Erol was struck by the Estaran descent and suffered an intense psychic
  episode — crippled by pain, falling to her knees, completely drained. Aldrin abandoned the Veterans' rally
  to protect her. Babas approached and offered aid; Erol accepted. She and Babas together theorized that this
  may be deliberate Estaran tampering — a mechanism to prevent Veterans from mounting effective resistance
  should they ever rebel. Erol said this was the only explanation she could see.

  She is now recovering at the waterfront plaza with Aldrin. She is in no state to join the riot. She is
  resolving to leave Aris and return home. This is a significant shift — Erol withdrawing signals real
  damage, not merely exhaustion.

  Xilo's eventual arrival will still be a significant moment. Her history with Milicent is unresolved.
