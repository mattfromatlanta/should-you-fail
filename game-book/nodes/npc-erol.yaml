summary: >-
  Eladrin veteran warlock, co-Founder of Oechenfor and Lome; was Milicent's warlock until the Estarans conscripted her;
  now serves Xilo; left Aris after Chapter 7.
player_content: >
  An Eladrin warlock and one of the great Founders of Oechenfor. She is stunning and wild to behold — supernatural
  presence more than mere beauty — and her Eladrin aspect (Spring, Summer, Fall, Winter) shifts with her mood. Unusually
  for her kind, she often appears as a blend, or as something stranger: an Indian Summer, a False Spring, a morning
  thunderstorm, a drought in March. Other Eladrin do not generally do this.


  Erol was once Milicent's warlock, the earliest known bond between them. The Estarans conscripted her before the
  Second Rebellion and took her away to unknown work; when she returned and saw what Milicent had become, she severed
  the bond. She lived quietly for a time, then sought out Xilo when the Rebellion began in earnest so she could fight
  the Estarans with her full power. She is his warlock now. As a Fey veteran she is far less affected by the lingering
  Estaran magic mortal veterans carry, though she — like all veterans — has no clear memory of her service.


  With Lamat she co-founded Lome, then Oechenfor; for a stretch they disappeared together between Feywild and
  Shadowfell refuges, fearing Milicent would come to conscript her back. She returned dramatically at the end of
  Chapter 2 to slay Torma the Unforgiving and save the party. On meeting Cetyri she recognised what he was, suspected
  Milicent's hand in it, and sent the party to Naeliste — and then to Yrk for the Trickster's Blessing.


  Erol and Aldrin Stoneward were once partners, before Erol and Lamat grew close. Deep affection remains; to Aldrin she
  is the one who got away, and Erol admires him deeply but cannot live constrained in his soldierly, structured orbit.
  She articulated this to the party in Aris as a Fey-law philosophy: Fey remember their agreements and renegotiate when
  needed, and so have no need of written laws — a system that only works because they do not die between generations.
  See concept-fey-law-philosophy.


  In Chapter 7 in Aris, acting as envoy to local leaders and Citizen Counselors, she was struck by the Estaran psychic
  event at the waterfront illusion and suffered an intense episode — falling to her knees, completely drained. Aldrin
  abandoned the Veterans' rally to protect her, and Babas came forward to help. Together Erol and Babas theorised that
  this may be deliberate Estaran tampering — a mechanism to prevent veterans from ever mounting effective resistance.
  Erol resolved to leave Aris and go home. She and Aldrin departed before the party crossed to Metgal.
dm_content: >
  **Where she went.** Erol and Aldrin are heading to Oechenfor. The party does not know where they went, only that they
  left Aris together.


  **Damage from the waterfront event.** Erol withdrawing signals real damage, not merely exhaustion. The "Estaran
  tampering of veterans" theory she shared with Babas is the working hypothesis the campaign is built around — treat it
  as load-bearing for any future veteran scenes.
