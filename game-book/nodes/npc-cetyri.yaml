summary: >-
  Young gold dragon, recovered from revenant state to a living dragon again — indistinguishable as such to most
  observers; the multiplicity of his soul makes him the intended Golden Wyrm Singularity; committed party ally currently
  travelling in pseudodragon form on Ikellor.
player_content: >
  Cetyri is a young gold dragon from the world Aerus. He is quiet and introspective, tasked with terrible purpose to
  become the Dragon Singularity and save the Cosmos itself. He travels with the party now, while they walk the path
  Milicent has laid out for them.


  Held for a century in Milicent's Shadow Keep, Cetyri was released into the Underdark only months before the campaign
  began — carrying the aspect of undeath, barely aware of where he was, believing he might still be imprisoned. He had
  become a revenant. The party found him in the underground lake in Chapter 2, rescued him, brought him to Naeliste, and
  through Lomani's care he slowly recovered a semblance of normal life. Through death, undeath, and rebirth, he is
  uniquely ready to seek the pieces of his multiple soul and join with them.


  Cetyri of Aerus has promised he will do what he can to permanently defeat the Estarans. For the moment, he travels
  with the party disguised as a pseudodragon with copper scales and golden eyes. His greatest fear is that the Estarans
  — or even another Cetyri — could learn their plans, to the ruin of all.
dm_content: >
  **Capture and imprisonment timeline.** Milicent captured Cetyri ~100 years ago — roughly 50 years after the Veterans'
  Rebellion ended and the Estarans were driven from Aerus. By then she had thoroughly interrogated her Estaran prisoner
  and formed her master plan for the Dragon Singularity. The century of imprisonment was deliberate soul preparation,
  not mere captivity. She released him into the Underdark months before the campaign started — he was found by the party
  in Chapter 2 barely aware he had been freed.


  **The first merge target.** The hatchling Cetyri imprisoned in the dead Feywild (npc-cetyri-hatchling) is the planned
  first merge. The pull Cetyri feels is real and growing; it will intensify as the campaign approaches its climax of
  Chapter 8. The merge will age him to an Adult gold dragon.


  **His arc across the remaining chapters.** Cetyri begins quiet, introspective, and guarded — his thoughts on his own
  transformation largely unknowable to the party. This should shift after the first merge. As an Adult, he will slowly
  become more vocal: sharing observations, offering perspective, eventually taking something closer to a patron role as
  the party moves toward the final confrontation.


  **Running Cetyri in combat.** Honour his stated stance — stays small and observant unless the mission itself is at
  stake. He is not a party-saving dragon-out-of-the-bag. His refusal to break cover is not cruelty; it is commitment to
  a larger truth. This may evolve post-merge as his confidence and form grow.


  **His interiority.** Play him as someone who has made peace with an ending, but not without cost. Moments of quiet
  melancholy are in character — for now. Watch for opportunities to let that quietness crack open into something richer
  as he grows.
