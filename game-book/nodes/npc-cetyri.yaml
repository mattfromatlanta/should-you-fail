summary: >-
  Young gold dragon, recovered from revenant state to a living dragon again — indistinguishable as such to most
  observers; the multiplicity of his soul makes him the intended Golden Wyrm Singularity; committed party ally currently
  travelling in pseudodragon form on Ikellor.
player_content: >
  A young gold dragon. For most observers, indistinguishable from a living dragon — though he died as Milicent's
  prisoner, returned as a revenant, and has since recovered nearly the whole way back. He is no longer a revenant.


  Originally a protector of good people on the world Aerus. Milicent captured and tortured him over the course of a
  century, killed him, and discarded the body. The party found him in Chapter 2 in the Underdark — at that time blind, a
  revenant possessed by revenge, washed there along an underground river from Milicent's dungeon. He has been with the
  party (and Bronik) since.


  Erol quickly recognised his nature and sent him with the party to Naeliste, where Lomani Nae examined him and found his soul radiating in
  beams to many worlds at once. Lomani diagnosed him as metaphysically damaged rather than truly undead, and Cetyri had
  already begun to heal. While the party travelled south with Eigitch, Cetyri recovered fully under Lomani's care — his
  sight returned and he became a living dragon again in every visible way. When Lomani then asked him directly about the
  radiance — a violation of a secret dragons fiercely protect — Cetyri fled into the Feywild in
  a panic, Bronik with him.


  The party caught up to him in Qu in Chapter 6a. There he learned of the fifty-four Estaran resets and Milicent's plan:
  because his death has severed him completely from the mortal world (in the same way the Trickster's Blessing severs
  the party), he can safely merge with his other facets and become the Golden Wyrm Singularity — the one thing the
  Estarans cannot survive. He committed to the plan, and has travelled with the party since, meditating on his future
  and keeping his thoughts mostly to himself.


  Through Chapter 7 in Aris he was a quiet companion. In Chapter 8 he meditated at the Radiant Lance at Metgal and chose
  the path the party crossed by. On arrival in Ikellor he shifted into a pseudodragon — copper-gold scales, golden eyes
  — for tactical reasons he has made plain: if an Estaran recognises him, or if another dragon (including another
  Cetyri) reacts in panic or violence to his presence, the mission is finished. He will only take true dragon form when
  the mission itself demands it, and has told the party openly that he will not save their lives if the mission can be
  spared by their deaths.


  In Farthim he told Cormin privately, and the party soon after, that he can feel this world's Cetyri pulling at him
  from the direction of the old garrison.
dm_content: >
  **The first merge target.** The hatchling Cetyri imprisoned in the dead Feywild (npc-cetyri-hatchling) is the planned
  first merge. The party do not yet know the hatchling exists; Cetyri's pull toward the garrison — which they saw in
  Farthim Session 2 — is the first concrete signal of the merge to come. His full emotional preparation for the merge,
  and what the merge looks and feels like from the outside, remain in flux. To be played out across the remainder of
  Chapter 8.


  **Running Cetyri in combat.** Honour his stated stance — stays small and observant unless the mission itself is at
  stake; will not break cover to save individual party members. He is not a party-saving dragon-out-of-the-bag.
