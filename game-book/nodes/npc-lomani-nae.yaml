  his soul's multiverse-spanning nature.
player_content: ""
dm_content: >
  The Quiet Branch and spiritual elder of House Nae. Cleric who maintains Naeliste's permanent teleportation nexus (the
  Circle).


  Through careful spiritual examination of Cetyri, he discovered that Cetyri's soul exhibits an irregular, dispersed
  pattern with beams reaching to many worlds simultaneously. He diagnosed Cetyri as metaphysically damaged rather than
  truly undead, and Cetyri recovered rapidly under his care while the party travelled south with Eigitch.


  Seeing the recovery, Lomani made the mistake of asking Cetyri about the radiance. Dragon-soul multiplicity is
  something dragons keep from every other race — only the Estarans know it, and only from experience. The question,
  however well-meant, prompted Cetyri's panicked flight from Naeliste, Bronik with him.
