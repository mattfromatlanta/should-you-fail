summary: >-
  The Doorkeeper of Naeliste; cleric who maintains the city's teleportation Circle; spiritually examined Cetyri and
  inadvertently triggered his flight.
player_content: >
  The Quiet Branch and spiritual elder of House Nae, and the cleric who maintains Naeliste's permanent teleportation
  Circle. He is formal, careful, deliberate — a man whose work is precision, and whose Fey nature gives him an
  unhurried, slightly distant manner.


  In Chapter 3 he examined Cetyri at the party's request and discovered that Cetyri's soul radiates in beams to many
  worlds at once. He diagnosed Cetyri as metaphysically damaged rather than truly undead, took him into his care, and
  by the time the party returned, Cetyri had recovered nearly fully. Seeing the recovery, Lomani asked Cetyri directly
  about the radiance — a courteous question, and a serious mistake. Dragon-soul multiplicity is the secret dragons
  fiercely keep from every other race, and Lomani had no way to know. Cetyri fled into the Feywild in panic, Bronik with
  him, and the party went after them. Lomani has carried the misstep quietly since.
