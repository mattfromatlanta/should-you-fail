summary: The party departs Naeliste in Eigitch's submarine "The Rainbow Trout" through the underground river system; a map error leads them off course into unexpected territory.
content: |
  The party boards Eigitch's submarine, the "Rainbow Trout," and descends into the Underwet—the
  underground river system flowing beneath the Allied Cities. Travel through the Underwet is
  protected from Milicent's tracking.

  A mistake on Eigitch's map leads them off the planned route into unexpected territory—
  setting up their encounter with the Aboleth.
