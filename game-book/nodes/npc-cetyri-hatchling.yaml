summary: >-
  The ice world's iteration of Cetyri — a gold dragon hatchling imprisoned in Torma's lair in the dead Feywild; the
  subject of the merge in Chapter 8.
dm_content: >
  The ice world's version of Cetyri — a gold dragon hatchling, imprisoned in the deepest part of Torma's lair in the
  dead Feywild. Taken as a prize. He is held in suspended animation inside a block of ice. Torma keeps him because she
  wants to and she can.


  The party's Cetyri can sense the hatchling's general direction but cannot read him clearly — he is not on the mortal
  plane, which confuses his senses. This resolves when the party crosses into the dead Feywild.


  The merge is safe: the party's Cetyri is the stronger dragon, and the hatchling has no deep attachment to this world —
  he has known nothing but captivity. After the merge, Cetyri grows in power. Not all Cetyris across worlds are the same
  age; the rules for what makes a merge safe versus dangerous will be tested further in later chapters.
