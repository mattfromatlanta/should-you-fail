dm_content: |
  A dark reflection of the mortal world. Milicent maintains her mountain fortress here where
  she raises the Dread Legion. Travel to the Shadowfell is perilous—hostile environments,
  dangerous terrain, threats that erode safety simply by existing there.

  Erol and Lamat briefly hid in Shadowfell refuges during their disappearance.
