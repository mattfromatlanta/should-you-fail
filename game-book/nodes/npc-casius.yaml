content: >-
  Designed and maintained the Estaran artifacts in and around Farthim, including the ring one mile from the town center.
  Collaborated with Farthim craftspeople; some of his techniques have been absorbed into local building practices
  without residents fully understanding their origin.


  Less warm than Tarliel but generous with practical knowledge. He seemed to find mortals most interesting when they
  were solving problems.
