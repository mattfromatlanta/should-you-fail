player_content: ""
dm_content: >
  Approximately 2000 years ago, the Estarans arrived on Aerus. Their first act was to raise up the mortal races —
  teaching them about civilization, building cities, appearing as great benefactors. For a long time, that is exactly
  what they seemed. Mortals thrived under their guidance and had little reason to question it.


  The Fey were not deceived. Fey and Estarans are structural enemies throughout the cosmos; the resistance began almost
  immediately. Led by the seven Rebel Fey — Itrina, Carris, Xilo, Ozevriel, Thessa, Varuun, and Milicent — the Fey
  fought the Estarans from the moment they arrived. The front of this war was the Faedwood and the wild places; mortals
  building cities with Estaran patronage far away were largely unaware a war was being fought on their behalf.


  The First War ended in strategic withdrawal, not victory. The Fey were pushed back but not destroyed. Key events:

  - The Fey bottlenecked the Estaran advance through the Faedwood

  - Yrk the Trickster survived through misdirection and sabotage rather than direct confrontation

  - Aldrin Stoneward was gifted with ageless life by the Estarans during this era — the reasons are not fully known

  - The war ended in stalemate; the Estarans continued ruling Aerus for roughly 1600 more years


  The Fey did not forget. The Second Fey War would come ~1600 years later. See event-second-fey-war.
