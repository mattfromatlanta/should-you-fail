id: enc-ch6b-02-xilo-alliance-and-return
type: encounter
name: "Ch6b E02: Xilo's Alliance and Return to the Material Plane"
tags: [chapter-6b, roleplay, xilo, alliance, feywild-compass, material-plane-return, aris-plan]
status: complete
summary: Xilo arrives thrilled by the party's success; gifts them a Feywild Compass; volunteers to travel to Aris with the party as an envoy of the Rebel Fey; the party returns through a Fey crossing.
content: |
  Xilo arrives within the hour, his forces having scattered the hobgoblin army. He is thrilled
  by the efficiency of the assault—grateful the dragon is destroyed and eager to keep his word.

  He provides:
  - **Safe passage** via a stable Fey crossing he controls
  - **Feywild Compass**: a magical item that always points to the nearest Material/Feywild
    crossing (useful for future travel)
  - **Alliance pledge**: "When the Estarans return, call on me. The Rebel Fey will answer."

  Beyond the original deal: Xilo agrees to travel to Aris with the party as an envoy of the
  Rebel Fey, having coordinated correspondence with the other lords. This is a significant
  development—the Rebel Fey sending a formal representative to the mortal capital.

  Captain Marvo, now recovered, returns to his business in Qu.

  Cetyri and Bronik accompany the party. The group emerges back in the Faedwood, not far from
  where they entered. The party is returning to the Material Plane with:
  - Cetyri's commitment to the cause
  - Xilo as a traveling Fey envoy
  - Milicent's observatory research documents
  - Egedzoo's substantial hoard
  - Freedom to move on the Material Plane
