player_content: ""
dm_content: >
  A massive fortress in the Shadowfell, located in the mountains. Established ~250 years ago when Milicent abandoned her
  tower at Ozevriel's memorial and moved her base of operations into the Shadowfell. The Shadow Projector is housed
  here. Contains audience halls, a sealed chamber where Milicent keeps an imprisoned Estaran prisoner of war, and
  quarters for the Dread Legion. The party visited in Chapter 5 as guests, learned the truth about the 54 resets, and
  forged their alliance with Milicent here.
