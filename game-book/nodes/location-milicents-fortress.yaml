summary: Milicent's seat of power in the Shadowfell; houses the Shadow Projector; where the party first met Milicent in Chapter 5.
content: |
  A massive fortress in the Shadowfell, located in the mountains. The Shadow Projector is
  housed here. Contains audience halls, a sealed chamber where Milicent keeps an imprisoned
  Estaran, and quarters for the Dread Legion. The party visited in Chapter 5 as guests, learned
  the truth about the 54 apocalypses, and forged their alliance with Milicent here.
