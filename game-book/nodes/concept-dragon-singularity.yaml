summary: >-
  A dragon who unifies all versions of their soul across realities into one impossibly powerful being—the Estarans'
  greatest fear.
player_content: ""
dm_content: >
  Dragon souls reach across space to other versions of themselves on other worlds. A dragon who binds all versions of
  their soul becomes a Unary Great Wyrm — a Dragon Singularity. These beings are among the most powerful cosmic forces
  in existence and are the only things the Estarans genuinely fear. Varkhasia, a red great wyrm, nearly destroyed the
  Estaran Empire before they annihilated the cosmos to stop him — triggering the 44th Cosmos to prevent his victory.


  The process is perilous: bringing dragon instances into proximity could fuse them into a stronger creature, or could
  cause catastrophic damage to the world where it happens. Unlike regular dragons, Unary Great Wyrms can be truly and
  permanently killed.


  Cetyri's severed soul reaches across realities in an unusual dispersed pattern, making him uniquely able to safely
  unify with his other selves — this is the basis of Milicent's plan. Milicent spent a century keeping Cetyri prisoner,
  intentionally damaging his soul in precisely the way needed for the singularity process.
