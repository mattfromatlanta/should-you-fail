summary: Female human cleric from Manu; missionary companion to Beacon; one of the seven player characters.
player_content: >-
  A human cleric from Manu, a village on an island in the great bay between Hestar and Alimar. She and Beacon grew up
  together there and left as missionaries, carrying their faith into a wider world they were not entirely prepared for.
  Their bond is close and their outlook, at least when they arrived, was somewhat naive — formed by an island community
  far from the political and cosmic entanglements the party has since walked into.


  She is one of the seven members of the party.
dm_content: >-
  Player character. Female human cleric. One of the seven members of the party. Travelled to the wider world as a
  missionary alongside Beacon; both are from Manu, a village on an island in the great bay between Hestar and Alimar.
