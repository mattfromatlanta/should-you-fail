id: npc-amalia-farthim
type: npc
name: Amalia
summary: Farthim's hunt master and lore keeper; leads hunting parties and holds the village's oral history of the dead Feywild.
status: alive
tags:
  - ice-world
  - farthim
  - chapter-8
  - leader
  - hunter
  - lore-keeper
content: >-
  Amalia carries two roles — practical and historical. As hunt master, she leads the parties that go out after mammoths,
  giant elk, and woolly rhinoceroses. She has lost hunters to the giants' ambushes and feels those losses personally.
  She is the most urgent voice for dealing with Torma.


  As lore keeper, she holds the oral history of the ice world: what the Feywild was, how it died, what the cold means.
  When she sees Fey among the party, her reaction will be the most complex — wonder and grief together. She knows the
  stories, but she never expected to meet something from inside them.
relationships:
  - target: location-farthim
    rel: leads
  - target: location-dead-feywild
    rel: knows_lore_of
  - target: enc-ch8-04-the-settlement
    rel: appears_in
