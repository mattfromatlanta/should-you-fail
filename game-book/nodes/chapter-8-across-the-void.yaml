id: chapter-8-across-the-void
type: chapter
name: "Chapter 8: Across The Void"
summary: >-
  The party crosses to an alien ice world for the first time using the Radiant Lance, confronts Torma and her dragon
  children, and frees a hatchling Cetyri imprisoned in the dead Feywild.
status: in_progress
