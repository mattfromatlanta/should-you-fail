content: >-
  After a farewell with Xilo on the road to Metgal, the party activates the Radiant Lance at the crater's heart and
  crosses to another world for the first time. Only Felicity and Cetyri make the crossing with them — no Feywild Fey can
  safely enter Metgal; Xilo, Yrk, Gallifax, and Maelric remain behind.


  The destination is an ice world gripped by a centuries-long winter, triggered by the Estarans' deliberate destruction
  of its Feywild. The Estarans withdrew approximately one year ago, recalled by central authority, leaving mortals
  without support or explanation. The party arrives on a glacier in a blizzard.


  The village of Farthim — a human and goliath settlement of ~150-200 people — has been under siege from Torma's Frost
  Giants for months. The villagers assume the Estarans sent the party as champions. Any Fey party members will be met
  with wonder: to these people, Fey are myth. The village elders can tell the history of the Feywild's death and the ice
  age, though much of it is legend now.


  To reach Torma, the party must break the giant tribe's hold on the valley. Torma's children — young white dragons
  Gullux and Bronik — lead the raids as lieutenants. Defeating the tribe opens access to the dead Feywild, where Torma
  has made her lair and where a hatchling version of Cetyri is imprisoned.


  The merge is safe: the party's Cetyri is the stronger, older version, and it is his younger self being freed. Both
  sides of the merge know this instinctively. The scene should feel like a homecoming, not a collision.


  ## Session 1 — Played


  E01, E02, and E03 completed. E04 in progress. Party crossed the void, survived arrival, defeated sabretooth cats,
  scouted the ring (Estaran artifact at the Shield boundary), and Sylvaris reconnoitered the town center. Session ended
  with the party withdrawing to plan their approach to Farthim.
