summary: >-
  The party crosses to an alien ice world for the first time using the Radiant Lance, confronts Torma and her dragon
  children, and frees a hatchling Cetyri imprisoned in the dead Feywild.
player_content: ""
dm_content: >
  After a farewell with Xilo on the road to Metgal, the party activates the Radiant Lance at the crater's heart and
  crosses to another world for the first time. Only Felicity and Cetyri make the crossing with them — no Feywild Fey can
  safely enter Metgal; Xilo, Yrk, Gallifax, and Maelric remain behind.


  The destination is an ice world gripped by a centuries-long winter, triggered by the Estarans' deliberate destruction
  of its Feywild. The Estarans withdrew approximately one year ago, recalled by central authority, leaving mortals
  without support or explanation. The party arrives on a glacier in a blizzard.


  The village of Farthim — a settlement of humans, dwarves, and goliaths, 65 survivors — has been under siege from
  Torma's Frost Giants for months. The villagers assume the Estarans sent the party as champions. The Eladrin party
  members (Sylvaris, Aelira) will be a shock — Farthimers know the Fey existed but believe they were dangerous and got
  what they deserved in the Fey War. The village elders can tell the history of the Feywild's death and the ice age,
  though much of it is legend and some of it is wrong.


  To reach Torma the Ancient, the party must break the giant tribe's hold on the valley. Torma's sons — Adult white
  dragons Gullux and Bronik — command the frost giants from the old Estaran garrison north-east of the valley. Defeating
  the tribe opens access to the Dead Forest east of the garrison, and from there to the dead Feywild, where Torma has
  made her lair and where a hatchling version of Cetyri is imprisoned in suspended animation.


  The merge is safe: the party's Cetyri is the stronger, older version, and it is his younger self being freed. Both
  sides of the merge know this instinctively. The scene should feel like a homecoming, not a collision.


  ## Encounter Outline


  - **E01: A Word with Xilo** — Farewell on the road to Metgal. [complete] - **E02: The Radiant Lance** — Crossing to
  Ikellor. [complete] - **E03: Shock of Cold** — Arrival, blizzard, sabretooths, scout. [complete] - **E04: The
  Settlement** — First contact with Farthim; the two perils; Estaran halls; star chart (Aerus / Maydor /
    Ozarrid). [complete]
  - **E05: Field Encounter — Frost Giants** — Eastward foray draws a patrol; giants fight to the death from terror. -
  **E06: The Old Garrison** — Four sub-areas (6a basement, 6b great hall, 6c Gullux's rafters, 6d Bronik's control
    tower); both dragons; Bronik bargains if Gullux falls.
  - **E07: The Dead Forest** — Frozen ruin east of the garrison; rifts to the dead Feywild; this world's Cetyri
    encountered along the way. [later session]
  - **E08: Torma's Realm** — Across the rift into the dead Feywild; Torma; first merge. [later session]


  ## Session 1 — Played


  E01, E02, and E03 completed. Party crossed the void, survived arrival, defeated sabretooth cats, scouted the ring
  (Estaran artifact at the Shield boundary), and Sylvaris reconnoitered the town center. Session ended with the party
  withdrawing to plan their approach to Farthim.


  ## Session 2 — Played


  E04 completed. Sylvaris eavesdropped on Amalia and Marx in the town square (supplies down to weeks). The party
  approached openly; the Farthimers asked if the Estarans had sent them and the party answered honestly that they had
  not — presenting themselves as researchers who had unraveled the Radiant Projector. They conjured a feast and led the
  two out to butchered sabre cats. On the trek they traded histories: the Farthim Estarans left a year ago; the frost
  giants are emboldened; the Fey are blamed locally for the ice age. The party seeded doubt about that story with their
  Aerus experience, and the Farthimers became inclined to agree more was being withheld.


  The party were warned about giants and a possible dragon, told of a 300-year war and a garrison built for 1,000
  Estaran soldiers, and given a valley map marking Farthim, the Garrison, and the Dead Forest. They explored the empty
  Generator/Barracks and Projector Hall, identified the ring as a Shield boundary with the core machinery removed, and
  read the embossed star chart — learning the Estaran name for this world, **Aerus**, and the routes to Maydor and
  Ozarrid. At lodgings that night, Cetyri (pseudodragon) privately told Cormin he can feel this world's Cetyri pulling
  from the direction of the garrison. The party began planning to investigate.


  ## Session 3 — Planned Scope


  E05 (field encounter with frost giants east of town) and E05b (the Old Garrison: basement, great hall, Gullux's
  rafters, Bronik's control tower). Dead Forest and Torma's realm are held for later sessions.
