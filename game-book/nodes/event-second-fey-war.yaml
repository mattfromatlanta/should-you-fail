id: event-second-fey-war
type: event
name: The Second Fey War
audience: dm-only
summary: >-
  ~400-250 years ago; the Fey of Aerus rose again to drive out the Estarans, suffered catastrophic losses, and were
  ultimately transformed by Milicent's creation of the Dread Legion.
