name: "Ch2 E01: What Lome Needs"
tags: [chapter-2, roleplay, lome, recovery, caera]
status: complete
summary: The party helps Lome begin recovery after the siege; Caera arrives with news; the town leaders articulate what they need to rebuild.
content: |
  Post-victory recovery scene. The party assists Lome with celebrating and beginning to plan
  recovery. Caera (Aelira's mother, a druid from Naeliste) arrives with news—she has not seen
  Erol in Naeliste either, confirming her continued disappearance. She notes Erol is female.

  Town leaders articulate recovery needs:
  - Kruftus (Security): protection, fortified shelter, food and supplies
  - F'zuga (Rebuilding): settlers, tradesmen, miners and stonecutters
  - Midge (Transport): road, elevator, flying couriers—proposes hippogriff breeding program

  Midge's hippogriff plan is discussed but interrupted before it can go anywhere.
