name: Eigitch the Old
tags: [goblin, naeliste, submarine, trickster, ally]
status: alive
summary: 173-year-old goblin of Naeliste; great-great-great-grandson of Yrk the Trickster; submarine captain and guide for the party's journey to the Drekklands.
content: |
  173-year-old goblin who lives in Naeliste. Great-great-great-grandson of Yrk the Trickster—only
  they know Yrk's true name (Ar'gix). Built and captains the submarine "The Rainbow Trout" in
  the Goblinworks. Guided the party through the Underwet to the Drekklands in Chapter 4. Enjoys
  practical jokes. Reunited with Yrk with dry, understated affection.
