summary: >-
  Chief Exarch of the Allied Cities; veteran of the Rebellion; restored from a two-month catatonic trance at the end of
  Chapter 7 and now travelling with the party to Metgal.
player_content: >
  Citizen Exarch of the Allied Cities, based in Aris, and a veteran of the Rebellion. Two months before Chapter 7
  began, he entered a meditative trance to explore his own subconscious and did not wake. Gallifax kept strict vigil
  over his body and trusted no one's attempts to reach him; his absence threw the Allied Cities into political crisis
  and was the political backdrop of the party's time in Aris.


  At the end of Chapter 7, Cormin, Babas, and Beacon reached him together in the trance, and Babas's magic restored
  him. The party briefed him afterward on the riot, the assassination attempt, and the Estaran cosmological threat. He
  took it all in; the party made the case for political change, and floated — with some irony — that Ardo Manessi
  could be given a more prominent role in the Council. He agreed to travel with the party to Metgal.
dm_content: >
  **Ardo's deeper conspiracy.** Not exposed when the party briefed Maelric. Still live for future chapters.


  **State after waking.** Treat him as functional but tender. Two months under was real damage, not just a nap.
