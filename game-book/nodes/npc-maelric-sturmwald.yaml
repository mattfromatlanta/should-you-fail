summary: >-
  Chief Exarch of the Allied Cities; restored from a two-month catatonic trance at the end of Chapter 7 by Cormin,
  Babas, and Beacon; now traveling with the party to Metgal.
content: >-
  Citizen Exarch based in Aris. Veteran of the Rebellion. Two months ago he entered a meditative trance to explore his
  subconscious and did not wake. Gallifax kept strict vigil throughout. His catatonic state threw the Allied Cities into
  political crisis.


  At the end of Chapter 7, Cormin, Babas, and Beacon worked together to reach him in the trance. Babas's magic restored
  him. He woke. The party briefed him on the events of the riot, the assassination attempt, and the Estaran cosmological
  threat. He took it all in. The party made the case for political change and suggested (with some irony) that Ardo
  Manessi could be given a more prominent role in the Council. Ardo's deeper conspiracy was not exposed.


  Maelric has agreed to travel with the party to Metgal.
