id: npc-maelric-sturmwald
type: npc
name: Maelric Sturmwald
tags: [human, veteran, exarch, aris, catatonic, rebellion]
status: alive
summary: Chief Exarch of the Allied Cities; fell into an unexplained catatonic trance ~2 months ago while meditating. The cause is unknown to any character in the game.
content: |
  Citizen Exarch based in Aris. Veteran of the Rebellion. Two months ago (mid-February) he
  entered a meditative trance to explore his subconscious. He did not wake. He is alive but
  unreachable, lost in his own consciousness. No character in the game understands what caused
  the trance or how to reverse it.

  His catatonic state has thrown the Allied Cities into political crisis. Gallifax keeps strict
  vigil. Rumors spread: that he is dead, imprisoned, or assassinated. His throne in the Hall of
  Allies in Aris sits empty. The Veterans faction wants a Council of Regency in his name; the
  Young Bastards see his collapse as evidence the Veteran-dominated system must change.
relationships:
  - target: npc-gallifax
    rel: guarded_by
    notes: Gallifax keeps vigil and trusts no one to reach him
  - target: npc-aldrin-stoneward
    rel: ally
  - target: faction-counsel-of-citizens
    rel: led_by
  - target: event-rebellion
    rel: participated_in
  - target: location-aris
    rel: located_in
