id: enc-ch2-05-the-revenant
type: encounter
name: "Ch2 E05: The Revenant"
tags: [chapter-2, roleplay, cetyri, underdark, lake, gold-dragon, revenant]
status: complete
summary: The party discovers Cetyri—a blind gold dragon revenant—in the cold underground lake; he believes he is still in Milicent's dungeon.
content: |
  At the underground lake in the middle of the beholder canyon, the party finds Cetyri. He is
  blind and in deep confusion—he knows he died but cannot reconcile this with what he is
  experiencing. He believes he is still in Milicent's dungeon. His body was apparently carried
  to this lake by underground water currents after being discarded by Milicent's forces.

  Cetyri was Milicent's prisoner for a century. She used him to train her Death Knights.
  Discovering he is free—and learning where he actually is—is news to him. He is traumatized,
  driven by vengeance against Milicent.

  The party must also clear the deep dragons (young pair) in the neutral territory as part of
  their deal with Maxxa'Valien. Two young black dragons—actually the same dragon in two bodies
  (a hint at multiverse), though the party likely doesn't realize this yet.
