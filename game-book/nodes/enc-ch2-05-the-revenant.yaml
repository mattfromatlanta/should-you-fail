summary: >-
  The party discovers Cetyri—a blind gold dragon revenant—in the cold underground lake; he believes he is still in
  Milicent's dungeon.
player_content: ""
dm_content: >
  On an island in the middle of the great underground lake at the heart of the beholder canyon, the party finds Cetyri.
  He is blind and in deep confusion — he knows he died but cannot reconcile this with what he is experiencing, and
  believes he is still in Milicent's dungeon. His body was discarded by Milicent's forces after his death and carried
  here along an underground river.


  Cetyri was Milicent's prisoner for a century. She used him to train her Death Knights. Discovering he is free — and
  learning where he actually is — is news to him. He is traumatized and possessed by vengeance against Milicent.


  The party must also clear the deep dragons (young pair) in the neutral territory as part of their deal with
  Maxxa'Valien. Two young black dragons — actually the same dragon in two bodies (a hint at multiverse), though the
  party likely doesn't realize this yet.
