id: event-shadow-war
type: event
name: The Shadow War
audience: dm-only
summary: >-
  ~250-150 years ago; Milicent's Dread Legion ground the Estarans down across Aerus while mortal veterans rose in
  rebellion, ending in the destruction of Metgal and the Estarans' final defeat.
