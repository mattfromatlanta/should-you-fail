content: >-
  The moment Gallifax leaves the Hall of Allies, a signal is sent. Three assassins — Corven, Aldrek, and Breva,
  radicalized Young Bastards manipulated into action over days by Ekert Shae — enter the Hall through sealed Estaran
  tunnels in the Underworks. Their target is Maelric, alone in his trance-throne.


  ### Setup Change: Nava and Ekert Are With the Party


  The party now has Nava Kurn with them, and Ekert Shae is alongside her. This changes the stakes considerably.
  Ekert knows the assassins are in motion — he has been waiting for exactly this moment. He will not
  volunteer anything and has no intention of alerting the party. His Obfuscating Daydream is active: any
  attempt to read his mind encounters a false surface mind preoccupied with Nava's safety and finding a way
  to save the city.

  Nava being with the party also reshapes the E08 scenario: if Maelric dies and Gallifax returns to find who
  lit the spark, he will come for Nava — and she is standing right next to the party. Gallifax will not be
  deterred by the party's presence. This encounter is no longer a case where he reaches her before anyone
  can intervene; it is a case where the party must choose whether to stand between an ancient dragon and a
  woman he intends to kill.


  ### The Trigger


  There are no hints. The party must decide on their own to go to Maelric when they see Gallifax take to the air. Any
  other priority — the riot, the city, protecting Nava — means the assassins complete their work. The moment is brief
  and the window is real.


  ### The Assassins


  Corven is the ringleader — steady, knows the Underworks, and believes the plan is his own. Aldrek is the muscle —
  aggressive, impatient, the most likely to act rashly. Breva is the youngest and most recently radicalized — she still
  has doubts and is the weakest point in the group.


  None of the three know who ultimately set this in motion. They know Ekert; they do not know Ardo.


  ### If the Party Arrives in Time


  The party encounters the three inside the Hall before the deed is done. The party is substantially more powerful —
  this is not a balanced fight. Corven and Aldrek will attempt to withdraw through the Underworks entrance while buying
  time. Breva is the most likely to surrender immediately under real pressure.


  **Capture and questioning:**

  - The three will not deny what they intended. They will defend themselves by stridently claiming they did what
  everybody wanted anyway.

  - Under sufficient pressure, they will surface "Nava's chum" — Ekert — as someone who was deeply sympathetic to their
  ideas and who, frankly, seemed to think it was time for bold men to act.

  - Corven is the hardest to break but holds the most information. Breva will give up Ekert's name fastest.

  - The dead-drop location for their payment and the Underworks route are both traceable back to Ardo if the party
  investigates further.


  Maelric survives. He remains in his trance, undisturbed. Gallifax, returning to find him alive, is grim and silent.
  The weight of having left is plain on his face. He will carry it.


  ### If the Party Does Not Arrive


  The three reach Maelric. Corven and Aldrek are efficient. Maelric does not suffer. By the time anyone raises the alarm
  the assassins are back in the Underworks and gone. No body left behind. No sign of entry. The Hall's guards — those
  not drawn out by the riot — find Maelric cold in his trance-throne. The wound is small and precise.


  Ardo Manessi will be among the first to arrive on the scene, looking shaken and grief-stricken. Move to E08.
