name: "Ch8 E05c: Gullux Comes Down"
summary: >-
  Gullux retaliates with a direct strike; the climactic fight that ends the tribe's grip on the valley; afterward,
  Cetyri locks onto the dead Feywild and leads the party to the threshold.
