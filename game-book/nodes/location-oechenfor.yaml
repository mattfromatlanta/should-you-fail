summary: Rich, fast-growing frontier city at the mouth of the Mistywinde River, founded ~20 years ago by Aldrin, Erol, Lamat, and other Rebellion veterans.
content: |
  Founded ~20 years ago at the mouth of the Mistywinde River by Aldrin Stoneward, Erol the
  Faed, Lamat Velu, and other Rebellion veterans. Far from the reach of the four core cities.
  The party's home base and starting point for the campaign.

  Events in Oechenfor:
  - Ch1: Aldrin calls for volunteers to investigate Lome
  - Ch5: Quickling kidnappings of promising young citizens; party investigation leads to
    the Milicent alliance
  - Lome evacuees arrived here after Torma's attack

  Nearby: the Faedwood (south), the Upland Stair (north through Faedwood)
