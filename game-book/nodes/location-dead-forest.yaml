content: >-
  A vast forest immediately adjacent to the old Estaran garrison. It died when the Estarans destroyed the Feywild
  three centuries ago. What remains is a frozen sprawl of dead trees and ruined undergrowth, riddled with rifts to the
  dead Feywild that never fully closed.


  It is an extremely dangerous place. Monsters and demons of the cold inhabit it — drawn through the rifts or born of
  them. Torma entered the dead Feywild through this forest thirty years ago and has not returned. The Frost Giants
  avoid it.


  ## Role in Chapter 8


  After the garrison is cleared, the party must enter the Dead Forest to find a rift that opens to the dead Feywild
  and Torma's territory. This is the path to confronting Torma and freeing the hatchling Cetyri. The ice world's
  Cetyri will be found by following this path.


  Layout, specific hazards, and the rift the party uses are TBD.
