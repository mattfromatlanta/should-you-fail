summary: Protected by the Trickster's Blessing, the party travels back through the Faedwood toward Oechenfor; centaurs warn them of dark omens hanging over the city.
content: |
  The party's first free travel since receiving the Trickster's Blessing—Milicent can no longer
  track them. They travel from Naeliste back through the Faedwood toward Oechenfor.

  Centaurs warn them: dark omens hang over Oechenfor. Something is deeply wrong in the city.
  This foreshadows the kidnapping crisis they are about to discover.
