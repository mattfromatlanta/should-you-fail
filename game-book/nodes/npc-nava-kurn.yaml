summary: >-
  Dwarf woman, 45; charismatic idealist and leader of the Young Bastards; survived Chapter 7 and teamed with Gallifax
  the morning after the riot to calm the city.
content: >-
  Charismatic leader of the Young Bastards, the reform-minded political faction in Aris. Sharp-tongued and pragmatic on
  the surface, but underneath a genuine idealist. Nava truly believes that the generations born since the Rebellion have
  been cheated — that the Veterans' unnatural longevity has calcified power into a permanent aristocracy that was never
  supposed to exist. She does not hate the Veterans personally. She thinks they are a broken class: people who outlived
  their moment and cannot see it.


  Her theory of change is confrontation through exposure. She organized the waterfront illusion because she believed —
  sincerely — that showing Aris how utterly unprepared the Veteran leadership is for any real new threat might finally
  shame them into yielding. She miscalculated badly. The illusion sparked a riot, hardened Veterans against the Young
  Bastards, and handed her enemies exactly the crisis they needed.


  What she did not know: the plan she thought was hers was shaped and executed by Ekert Shae, who designed the illusion
  and cast the amplification spell. Ekert and Ardo Manessi had been quietly stoking Veteran resentment for months —
  ensuring that any attempt at reconciliation found poisoned ground.


  CURRENT STATUS (END OF CHAPTER 7): Survived. The morning after the riot, Nava and Gallifax worked together to calm the
  city — an unlikely pair that proved effective. She carries the weight of what her demonstration caused, but she is not
  broken. Ekert's betrayal is known to the party and she has been informed. Ardo's deeper involvement is not yet
  exposed. She remains in Aris.
