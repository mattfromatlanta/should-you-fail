summary: Brother Alistair Thornfield briefs the party: promising young citizens—particularly the talented and young—have been disappearing since the party left Oechenfor.
content: |
  At the Oechenfor town hall, Brother Alistair Thornfield delivers grim news. Since the party
  departed, people with exceptional promise—particularly young people with outstanding talent
  or potential—have been vanishing without explanation. The city is gripped by fear.

  This is Milicent's quickling operation: Felicity's team has been abducting candidates for
  the Dread Legion. The party doesn't know this yet—they need to investigate.
