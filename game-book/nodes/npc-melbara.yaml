summary: >-
  Queen Librarian of Naeliste's Library of Rhymes and Antiquities; Moon Druid; Aelira's grandmother; keeper of three
  pivotal historical documents.
player_content: >
  Queen Librarian of Naeliste and a Moon Druid, and Aelira's grandmother — Caera is her daughter-in-law. She curates
  the Library of Rhymes and Antiquities, the Fey collection that holds the Testament of Embers, Grib's letter from the
  First War, and the Ode to Seven Lords. Three of the most important revelations of Chapter 3 came through her — the
  party left Naeliste knowing more about the Estarans, the Rebel Fey, and what the world was actually facing than they
  had any right to expect, and the credit for that is hers.


  She is warm and unhurried in the way old librarians often are, but the warmth conceals a Moon Druid's seriousness;
  she is not a quiet figure to be underestimated.
