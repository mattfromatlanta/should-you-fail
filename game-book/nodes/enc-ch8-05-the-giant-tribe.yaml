summary: >-
  Any foray east of Farthim — hunting or marching toward the garrison — draws a frost giant patrol; the giants react to
  the party with horror and fight to the death rather than risk word reaching the Estarans they assume have returned.
dm_content: |
  The first direct engagement with the giant tribe. The trigger is geographic: any foray east of Farthim, toward the
  valley the giants patrol, will be intercepted. Whether the party is escorting a Farthim hunting party or marching
  on their own toward the garrison, the result is the same — a patrol finds them in the open.

  ## The Setup

  East of the ring, the valley opens into rolling snowfields and frozen game trails — mammoths, woolly rhinoceroses,
  giant elk, and the predators that hunt them. This is the territory the Farthimers used to hunt freely under Shield
  protection. The giants have controlled it for a year.

  If a Farthim hunting party is along, Amalia or Marx can brief the party on the pattern: giants come fast, hit hard,
  and do not negotiate. Hunters who survive say the giants seem more afraid than vengeful — but the result is the
  same: people die.

  ## The Patrol

  4–5 frost giants on patrol. They have likely been tracking the party for some time before contact (Gullux's scouts
  have been watching since arrival). The terrain is open — deep snow, no real cover, poor footing for smaller
  creatures, room for giants to use reach.

  Tactics:
  - Spread wide to cut off retreat west toward Farthim
  - Press the engagement aggressively; do not preserve themselves
  - Take game animals only incidentally — the priority is the party

  ## How the Giants React

  When they get close enough to see the party clearly, the giants react with **horror, not rage.** The party has
  weapons, magic, organized fighting — to the giants this is the unmistakable signature of an Estaran return. They
  assume the party were sent by the Estarans, the same way the Farthimers do, but from the opposite side: the
  Estarans killed giants in great numbers, and even the Farthim Estarans maintained the cull for centuries.

  Their fear is total. They will not flee, will not parley, will not surrender — fleeing or yielding gets word back
  to the Estarans about where the tribe is, and that is the one thing they cannot allow. **They fight to the death.**
  A pressed or dying giant may scream in Giant or Elvish — fragments of the old grief, rage that does not fit the
  body, hatred of "the angels" that no living giant should remember but every giant feels.

  ## What the Party Can Learn

  - The giants are terrified, not territorial.
  - They believe the Estarans sent the party — the same conviction Farthim holds, mirrored.
  - Something in them remembers Fey grief. They do not consciously know what they are.
  - The patrol came from the east — pointing toward the garrison.

  > **DM NOTE:** The frost giants are cursed surviving Forest Giants — the last Fey of this world, though their Fey
  > nature has faded. The Estarans destroyed the Feywild and won the war 300 years ago; the surviving Forest Giants
  > were forced to adapt to the cold. None alive remember that time, but the hatred and fear of the Estarans has
  > been carried in their surviving culture. Hatred of the Estarans' mortal wards — Farthim — is a natural byproduct.
  > A giant pressed will share this rage with anyone who asks; they just cannot place where it comes from. Answers
  > about their origin come in Torma's realm, not here.

  ## After the Fight

  - If a Farthim hunting party came along, survivors will be shaken but grateful. Land game is now available; the
    villagers can carry meat back. This is the first material win Farthim has had in a year.
  - The party can continue east toward the garrison if they choose. The patrol's origin makes the connection: the
    giants are based at the old Estaran structure in the mountains where the river flows down.
  - Gullux will know about this fight quickly. Word will not reach Farthim before the party returns, but the giants
    at the garrison will be ready.

  ## Notes

  - Cetyri (pseudodragon) observes from a hood or pack. He is still and watchful. He does not engage.
  - Gullux and Bronik are not here — they are at the garrison.
  - The party should leave this fight with two pieces of new understanding: the giants are not mindless, and the
    garrison is where the giant power lives.
