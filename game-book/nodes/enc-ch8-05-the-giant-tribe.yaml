content: >-
  The first direct engagement with the giant tribe. The party accompanies a Farthim hunting party — or intercepts one
  already in trouble — in the terrain north of the old Shield boundary ring.


  ### The Setup


  The Farthim hunters are few and worn. The best of them died in earlier ambushes. Marx (the quartermaster) can brief
  the party on the pattern: giants come from the north, hit fast, take the kill and sometimes the hunters too. They do
  not push far south. Nobody in Farthim knows why. The why: fear of returning Estarans. The ring is the Estaran
  boundary, and the giants have not crossed it in a year. They are patient, not merciful.


  ### The Ambush


  4–5 frost giants, coordinated but not subtle. They have been watching the hunting party from a ridgeline and hit in a
  gully or ravine north of the ring — deep snow, poor footing for smaller creatures.


  Giants' tactics:

  - Spread wide to cut off retreat south

  - Take the game animals first if possible (resource denial is the strategy)

  - Disengage if the fight turns — they are not desperate yet


  ### What the Giants Know and Feel


  The frost giants despise the Estarans with a ferocity that goes beyond territorial grudge. If a giant is captured or
  dying and the party presses, something surfaces: fragments of old rage, grief that does not fit the body, hatred that
  sounds like it belongs to someone who remembers the thing that was lost. The giants may not be able to articulate it.
  But it is there.


  > **DM NOTE:** The frost giants are cursed survivors of the Fey who lost the war here approximately 300 years ago. The
  Estarans destroyed the Feywild and won the war; the surviving Fey were bound into these bodies — trapped in the cold
  they helped sustain, in a world their own nature once warmed. Their hatred of the Estarans is the hatred of the
  conquered who cannot die and cannot leave. They do not consciously remember this history. It lives in them as
  instinct, rage, and grief they cannot name.


  ### Notes


  - Cetyri (pseudodragon) observes from a hood or pack. He is still and watchful. He does not engage.

  - Gullux and Bronik are not here — they are north at the old Estaran garrison.

  - The party should leave this fight understanding that the giants are not mindless. Something in them goes deeper than
  territory. And the ring holds them for reasons beyond cowardice.
