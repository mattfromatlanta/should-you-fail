id: faction-allied-cities
type: faction
name: The Allied Cities
tags: [government, mortal, allied-cities, counsel-of-citizens]
status: active
summary: Coalition of mortal cities freed from Estaran rule ~150 years ago, governed by the Counsel of Citizens.
content: |
  The Allied Cities span a diverse region unified by mutual history, shared culture, and open
  trade. Nearly two thousand years ago these lands were shaped under Estaran dominion. After
  centuries of conscription into extra-planar wars, mortals rebelled and banished the Estara ~150
  years ago. Their four major cities—Aris, Metgal, Hestar, and Alimar—form the political core
  and convene the Citizen Conference when unity is needed. Gallifax serves as their ancient
  dragon protector.
