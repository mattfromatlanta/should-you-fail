summary: >-
  The party tracks Cetyri and Bronik to Qu and has a heart-to-heart about the full stakes; Cetyri agrees to stop running
  and commits to the cause.
player_content: ""
dm_content: >
  The party travels to Qu and locates Cetyri and Bronik just as they are about to flee deeper into the Feywild. The
  party lays everything bare in an honest conversation:


  - Milicent's full plan and her reasons

  - The 54 previous apocalypses the Estarans have enacted

  - The Dragon Singularity — that a dragon who unifies all versions of their soul becomes a Unary Great Wyrm, the one
  thing the Estarans cannot survive

  - That because his death has severed him completely from the mortal world (in the same way the Trickster's Blessing
  will sever the party), Cetyri can safely merge with his other facets without catastrophic damage to the world he
  stands on — making him uniquely able to become the **Golden Wyrm Singularity**

  - The existential stakes: refusal means the survival of all existence is compromised


  Cetyri is overwhelmed. He is frightened. He needs time to process. But he understands the stakes and agrees to stop
  running. This is not enthusiastic acceptance — it is resignation to necessity. He commits to working with the party.


  Local robbers are handled without serious trouble after they arrive.
