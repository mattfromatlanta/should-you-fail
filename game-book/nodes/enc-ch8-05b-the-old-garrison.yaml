id: enc-ch8-05b-the-old-garrison
type: encounter
name: "Ch8 E05b: The Old Garrison"
summary: >-
  The party pushes north to the old Estaran garrison and clears it through four linked sub-areas — basement, great hall,
  rafters (Gullux's nest), and control tower (Bronik's nest); breaking the dragons' hold on the valley and opening the
  path to the Dead Forest.
