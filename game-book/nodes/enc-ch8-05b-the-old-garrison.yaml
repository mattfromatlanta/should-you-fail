id: enc-ch8-05b-the-old-garrison
type: encounter
name: "Ch8 E05b: The Old Garrison"
summary: >-
  The party pushes north to the old Estaran garrison — built for a thousand, now occupied by the remnant frost giants
  and Bronik; taking it breaks the tribe's operational base and surfaces the history of the Fey war.
