summary: >-
  Lomani Nae performs a spiritual examination of Cetyri and discovers his soul reaches across realities—the first
  in-world confirmation of his Dragon Singularity potential.
player_content: ""
dm_content: >
  Lomani Nae (he), the spiritual elder of House Nae and keeper of the teleportation circle, performs a careful spiritual
  examination of Cetyri. He finds that Cetyri's soul exhibits an irregular, dispersed pattern — beams of soul radiating
  to many worlds simultaneously, unlike the Eladrin's local cloud. From this, Lomani concludes Cetyri is not properly
  undead but metaphysically damaged, and the damage is beginning to heal.


  This is the first concrete in-world confirmation of what Milicent has known and planned around for decades. Cetyri
  himself is present for the discovery; the implications are profound and troubling.


  Cetyri stays in Naeliste under Lomani's care while the party travels south with Eigitch. The full reckoning of what
  this examination revealed — and Lomani's later mistake of asking Cetyri directly about the radiance — plays out in
  enc-ch6a-01-cetyris-flight.
