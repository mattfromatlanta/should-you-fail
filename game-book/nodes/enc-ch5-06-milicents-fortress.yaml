status: complete
summary: The party fully transitions into the Shadowfell to find Yrk and Milicent's honor guard waiting; they are escorted as guests to Milicent's fortress.
content: |
  The party fully transitions into the Shadowfell. Standing before them: Yrk the Trickster and
  members of Milicent's elite honor guard. They are treated as expected guests, not captives.
  Yrk has kept his word.

  The party is escorted through Milicent's vast mountain fortress—the Shadow Projector housed
  here, the Dread Legion's quarters evident, Milicent's military scale clear. They are
  brought to her audience hall. This is their first direct encounter with the Shadowdame.

  Milicent treats the party with honor and respect. She is attempting to recruit them willingly.
