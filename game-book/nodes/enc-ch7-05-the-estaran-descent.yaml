content: |
  The party made their way to Aris's enormous waterfront amphitheater and positioned
  themselves to observe without being seen. They expected a political demonstration.
  No crowd of activists gathered.

  At sunset, the sky opened.

  A hundred radiant beams descended from the heavens, each carrying an Estaran warrior —
  sword aflame, descending in perfect formation on Aris. Alarm bells
  rang out across every district of the city.

  Whether this is a real Estaran incursion or a coordinated illusion (as foreshadowed by
  the street intelligence warning) is not yet resolved. The session ended here.
