name: Letter from Caera to Melbara
tags: [document, rebellion, caera, melbara, personal, letter]
status: present
summary: A letter written by Caera to her mother-in-law Melbara during the Rebellion, expressing longing for her daughter Aelira and hope for victory.
content: |
  Written weeks before Thorn's disappearance, at the end of the Rebellion. A personal letter
  from Caera to Melbara, held in Melbara's Library of Rhymes and Antiquities in Naeliste.
  Caera writes from a burned-out halfling village near the front; she and Thorn (Aelira's
  father) are still fighting. The Estara are giving ground—something has changed, though no
  one knows why. Caera expresses longing for Aelira and asks Melbara to care for her.
  Melbara shared this letter with Aelira as an expression of trust and quiet remorse,
  acknowledging she has judged Aelira harshly and hopes to repair the distance between them.

  --- FULL TEXT ---

  To Melbara, in Naeliste—if this reaches you.

  We've pushed them back again. The Estara are giving ground. No one knows why. They're not
  fighting like they used to. Thorn thinks something's changed. I don't care what it is—we'll
  take it.

  We're camped near a burned-out village that was probably home to halflings. Nothing left
  here, really. Thorn found a wooden sword for a child and didn't say anything for a long
  time. He misses Aelira. We both do. I dream of her most nights. I wonder if she's picked
  a season yet.

  Tell her we're safe. Tell her her mother and father are trying to make a world she can walk
  through without fear.

  I hope she still listens when you tell stories.

  We'll come home as soon as we can.

  —Caera
