id: concept-tricksters-blessing
type: concept
name: The Trickster's Blessing
audience: player-available
tags:
  - yrk
  - blessing
  - protection
  - milicent
  - shadow
  - tracking
summary: >-
  A protection Yrk grants by ritually slaying recipients in a calm shadow space, severing their spiritual ties to the
  mortal world and making them invisible to Milicent's tracking.
player_content: ""
dm_content: |
  Yrk confers the Trickster's Blessing through ritual combat—he defeats and slays the recipients
  in a shadow space that is calmer and less corrupted than Milicent's. Through this death-and-
  reawakening, recipients are severed from their mortal attachments and their birth world. They
  can no longer be followed by Milicent or tracked on the mortal world. The blessing also makes
  travel between worlds easier (as referenced in campaign lore).

  The party received the blessing at the end of Chapter 4.
