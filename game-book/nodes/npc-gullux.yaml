summary: >-
  White half-dragon son of Torma the Unforgiving on Aerus; grafted dragon parts onto himself; led the Dragonborn
  invasion of the Uplands; defeated in Chapter 1. An iteration of the same soul as Gullux (Ice World), a true Adult
  white dragon on Ikellor.
player_content: ""
dm_content: |
  White half-dragon, son of Torma the Unforgiving and brother to Bronik. Transformed himself
  into something monstrous by grafting true dragon parts onto his already half-dragon form.
  Grafts held by stitched twine, leather bands, and metal staples. Size and strength of an ogre.
  Radiates cold, hateful energy.

  Led 50 White Dragonborn from the East Hills into the Uplands in winter. Betrayed Torma by
  stealing dragon eggs from her clutch—an act that established his leadership among the clans.
  Always jealous and insecure according to Bronik.

  Defeated by the party in Milicent's shadow projection in Chapter 1. After the party awakened,
  all remaining Dragonborn in the hideout were found dead—slain by Milicent.
