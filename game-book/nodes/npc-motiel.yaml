content: >-
  Tended to the sick and injured. The most beloved of the Twelve among ordinary residents. Over three centuries, nearly
  every family in Farthim has a story about Motiel — a fever broken, a wound closed, a difficult birth attended. He
  never made a spectacle of his healing; he simply appeared when needed.


  His absence is felt most acutely in winter, when illness runs through the settlement and there is no longer anyone to
  come quietly to the door.
