summary: >-
  Ardo Manessi's covert operative and illusionist; joined the Young Bastards at Ardo's command and quickly won Nava's
  trust as an advisor; the illusion of Estaran descent was his plan and his spell.
content: >-
  Ekert Shae has been Ardo Manessi's secret agent for a few years, operating quietly inside Aris's political scene. He
  joined the Young Bastards at Ardo's direct command, and over the last months climbed into Nava Kurn's inner circle as
  a trusted advisor — a position he cultivated deliberately and held through genuine usefulness. He is good at reading
  what people need to hear.


  He lacks Ardo's charisma entirely — he does not move rooms or win people over through force of personality — but he
  has two compensating gifts: a remarkable cunning for plots, and magic. Ekert is an illusionist of real ability. He
  reads who is vulnerable, what pressure to apply, when to speak and when to wait. Where Ardo works in the open, Ekert
  works in the gaps.


  The waterfront illusion was his plan from the start. Nava genuinely believed that staging a false Estaran descent
  would expose how unprepared the Veterans are for any real new threat — she thought the spectacle might shame them into
  yielding power. Ekert shaped that instinct into an operation. He designed the illusion, provided the magical
  execution, and amplified Nava's voice so the demonstration would land with full force.


  His motivation is uncomplicated. He sees Ardo's rise as his own best path to wealth and luxury. He has no ideology.
  Veterans and Young Bastards alike are terrain.


  CURRENT STATUS (END OF CHAPTER 7): Fled during the fight in the Hall of Allies when it became clear the assassination
  attempt had failed and Breva was captured. He did not answer Cormin's Message spell. He is currently hiding somewhere
  in Aris, keeping still. His plan is to wait until the heat passes, then quietly make his way to Oechenfor — where he
  believes he can disappear into a city big enough to swallow him. He is at large. His role in the plot is known to the
  party and to Breva. Ardo himself has not been exposed.
