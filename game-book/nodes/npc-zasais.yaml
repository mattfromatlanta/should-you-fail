content: >-
  Spent time with willing Farthim residents, teaching history, geography, and lore of other worlds. Some of Farthim's
  most educated citizens trace their knowledge to time spent with Zasais.


  She had opinions about mortal governance and was not shy about sharing them. Some residents found her inspiring;
  others found her patronizing — she had the manner of someone who had watched civilizations rise and collapse enough
  times to have stopped being surprised by any of it.
