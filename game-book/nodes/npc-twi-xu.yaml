summary: >-
  Animal Lord and close lieutenant of Xilo; literally a bluebird; first encountered watching Egedzoo, later sent ahead
  to make arrangements for the party in Aris.
player_content: >
  An Animal Lord and Xilo's Lieutenant of Bluebirds — one of Xilo's closest advisors. Like Xilo he is, literally, his
  animal: a bluebird, moving between small bird, hybrid, and humanoid forms as needed, and carrying the manner of the
  bird through all of them.


  The party first met him at Rinick's Diner in the Feywild wasteland, where he was holding a tense standoff with
  Egedzoo — neither willing to break the neutral ground. Once he learned the party worked with Milicent he agreed to
  help arrange a meeting with Xilo, though he could not abandon his post to guide them himself. Later he went ahead to
  Aris to make arrangements before the party arrived, met them at the city gate, and led them to the High Ward and
  the guest houses kept there for dignitaries.
