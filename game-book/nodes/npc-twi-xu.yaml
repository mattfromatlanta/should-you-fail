id: npc-twi-xu
type: npc
name: Twi'Xu, Animal Lord, Lieutenant of Bluebirds
tags: [fey, animal-lord, xilo, feywild, ally]
status: alive
summary: Animal Lord and close lieutenant of Xilo; literally is a bluebird; encountered at Rinick's Diner where he monitored Egedzoo; sent ahead to Aris to make arrangements for the party's arrival.
content: |
  Powerful Fey creature and vassal of Xilo, Lord of Robins. As an Animal Lord, Twi'Xu
  literally is a bluebird — he moves between a small bird form, a hybrid form, and a humanoid
  form. He carries the energy and manner of his bird nature.

  One of Xilo's closest advisors, titled Lieutenant of Bluebirds. Encountered at Rinick's
  Diner in the Feywild wasteland, holding a tense standoff with Egedzoo — neither willing to
  fight in neutral territory. Agreed to help arrange a meeting with Xilo after learning the
  party works with Milicent. Could not leave his post to guide them directly; doing so would
  have given Egedzoo too much freedom.

  Sent ahead to Aris to make arrangements before the party's arrival. Met the party at the
  city gate and led them to the High Ward, where guest houses for dignitaries are available.
