content: >-
  A world in the grip of a centuries-long ice age, the long consequence of the Estarans' deliberate destruction of its
  Feywild. The growing season is near nothing. Large fauna — mammoths, woolly rhinoceroses, giant elk — have moved into
  lowland valleys, followed by the predators that hunt them.


  The Estaran name for this world is Ikellor (eye-KELL-or). Farthim residents know the name but don't use it much —
  they think of themselves as Farthimers before all else, and feel themselves to be natives even though they know they
  are not. This world had no native mortals; the original settlers came from Aerus (the party's home world) and from
  other worlds, relocated by the Estarans. They have no recorded history or cultural memory of a previous home.


  The Estarans withdrew approximately one year ago, recalled by central authority with no explanation given to the
  mortals who had organized their lives around Estaran presence.


  The wrongness of the sky is felt on arrival but not immediately named. Something that should be there isn't. The world
  feels thinner than it should. The party will not be able to name what is absent until they learn the local history.


  The dead Feywild can still be reached as a collapsed hollow plane. Torma the Ancient has made her lair there.


  Settlements: Farthim (human, dwarf, and goliath village, valley adjacent to a frozen river). The only remaining
  mortal settlement — there were many, but they have been abandoned or died out since the ice age began.
