summary: Personal letter from a goblin soldier named Grib to Yip, written during the First War; a rare window into the desperate early resistance against the Estarans.
content: |
  Believed dated to the first years of the Age of Estara. A personal letter from a goblin
  soldier named Grib to his friend Yip, held in Melbara's Library of Rhymes and Antiquities
  in Naeliste. Documents the Fey's strategic withdrawal to the Faedwood, the loss of Captain
  Murt, and the overwhelming Estaran advance. The postscript mentions Yrk by name—connecting
  to Yrk the Trickster. Annotated note (likely Melbara's) notes this is a rare window into
  a period largely lost to time.

  --- FULL TEXT ---

  Dear Yip,

  Still breathing. Still ugly. Still got all my fingers, though the pinky on the left's a
  little hesitant now. Might be nerves. Might be the charm I stole off a dryad's grave—hard
  to say.

  We thought we'd hold the ridge at Varn's Curve. We had the Faelight archers with us, even
  one of those Elk Lords with the antlers like iron. All of them scattered like leaves in
  wind. The Estara didn't even sweat. They don't fight, Yip. They advance. Like fog that
  forgets to lift.

  We lost Captain Murt. He laughed right up until he didn't. Said if he was going to die, he
  hoped it'd be in the middle of a boast. I think that's how he'd want to go. Still. Hurts.

  They're saying now we'll fall back to the Faedwood and try to bottleneck the bastards. The
  roots run deep there, and the trees remember worse. But I've seen how the Estara burn
  memory itself. Don't know if the wood will hold. Don't know if we will.

  Anyway, I traded boots with a satyr for half a map and three clean bandages. Still not sure
  who got the better end. He played a tune after and said it was for the ones we forgot. I
  didn't cry, but I chewed my lip until it bled. That's different.

  Tell Ma I still wear her charm-stone. Tell Glit I'll teach her that knife trick if I come
  back.

  If not—burn this letter. No one needs to know I was scared.

  —Grib

  P.S. If you ever see Yrk again, kick him once for calling me short. Twice if he's drunk.
  But we both know you won't see him.
