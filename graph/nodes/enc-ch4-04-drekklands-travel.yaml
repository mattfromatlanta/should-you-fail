id: enc-ch4-04-drekklands-travel
type: encounter
name: "Ch4 E04: The Drekklands"
tags: [chapter-4, travel, combat, drekklands, dinosaurs, temporal-slippage, magical-instability]
status: complete
summary: The party travels southwest through the magically unstable Drekklands, encountering dinosaurs, trolls, and the swamp's reality-bending phenomena.
content: |
  The party sets out southwest through the Drekklands to avoid Kriv's eastern territory.
  The Drekklands are profoundly strange: shifting channels (rivers alter overnight), temporal
  slippage (events repeat; echoes arrive before sounds), illusion-rooted flora masking hazards,
  mood-inducing weather, and folded terrain that loops back with subtle differences.

  Navigation requires Survival DC 15 or Arcana DC 17. Various encounters during travel:

  Day: Tyrannosaurus, Triceratops, Giant Ape, Trolls, Brontosaurus, Giant Crocodiles, Venom Trolls
  Night: Bodaks, Svirfneblin Hunters, Froghemoth, Ghast Gravecallers, Ghasts, Rot Trolls
relationships:
