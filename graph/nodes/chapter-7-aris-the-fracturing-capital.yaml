summary: Party arrives in Aris to find the political situation fractured: Maelric is catatonic, Veterans vs Young Bastards battle for control, and Yrk/Felicity are en route.
content: |
  Aris is in crisis. Chief Exarch Maelric fell into a catatonic trance ~2 months ago after
  triggering an Estaran psychic trap. The Counsel of Citizens is deadlocked: Veterans faction
  (wants Council of Regency in Maelric's name) vs Young Bastards reform movement (wants
  new leadership, veteran retirements, resource redistribution). Aldrin and Erol arrived and
  are trying to hold things together.

  Gallifax keeps strict vigil over Maelric, trusting no one. Ardo Manessi plays both sides.
  Doppelganger infiltration rumored.

  Yrk and Felicity will arrive a few days after the party, bringing the portable Radiant
  Projector project. The party must navigate the political crisis while preparing for the
  next phase of the cosmic quest.

  Current status: In planning. Five key encounters TBD.
