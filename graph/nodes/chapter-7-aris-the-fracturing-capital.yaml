id: chapter-7-aris-the-fracturing-capital
type: chapter
name: Chapter 7: Aris - The Fracturing Capital
tags: [chapter, aris, maelric, political-crisis, veterans, young-bastards, in-progress]
status: in-progress
summary: Party arrives in Aris after a month on the road to find the city politically fractured. Maelric is catatonic, Veterans have dominated politics for 150 years due to unnatural longevity, and the Young Bastards demand change.
content: |
  The party arrived in Aris after a month on the road, having stopped in Naeliste and Oechenfor
  along the way. Twi'Xu was sent ahead to make arrangements and met them at the city gate,
  leading them to the High Ward where dignitaries are housed.

  The city is in crisis. Chief Exarch Maelric fell into a catatonic trance ~2 months ago after
  triggering an Estaran psychic trap. Gallifax keeps strict vigil over him in the Hall of Allies,
  trusting no one.

  The political conflict: Veterans have held dominant power in the Allied Cities for 150 years,
  sustained by unnatural longevity granted by Estaran magic. Whole generations of mortal citizens
  have lived and died without inheriting political power. The Young Bastards are a loosely
  affiliated movement of activists and leaders — many quite old by mortal standards, but young
  compared to Veterans — who argue this has to change. They want veteran retirements, new public
  offices, and redistribution of resources away from permanent war posture. The name is somewhat
  ironic; they are not literally young.

  Aldrin and Erol arrived two months ago hoping to stabilize things. Aldrin is trying to hold
  the peace as a moderate voice, increasingly exhausted. Ardo Manessi plays both sides, secretly
  hoping to engineer chaos that will position him as Maelric's successor.

  What has happened in session:
  - On the way into town, the party intervened in a near-fight between Young Bastard protesters
    and a trio of Veterans. The Veterans would likely have killed protesters. The party de-escalated.
  - First morning: met Aldrin and were introduced to Ardo Manessi. Learned the situation with
    Gallifax and Maelric. First heard of Nava Kurn (haven't met her yet).
  - Visited Erol, who gave her perspective: Young Bastards have a valid complaint; Veterans are
    too hidebound; loss is hard for long-lived creatures like Gallifax.
  - Cormin led the party to find the protesters they saved and gather intelligence on the city's
    mood. Picked up a rumor: something big is planned at the waterfront that evening, and not to
    believe their worst fears.
  - The party went to the waterfront amphitheater and hid to observe. As the sun set, a hundred
    radiant beams descended from the heavens — each carrying an Estaran warrior, sword aflame,
    descending on Aris. Alarm bells rang across the city. [Session ended here.]
