id: npc-maelyn-heatherfields
type: npc
name: Maelyn Heatherfields
tags: [halfling, oechenfor, van-morgaaran-trading, officer, ally]
status: alive
summary: Halfling officer of Van Morgaaran Trading; Delamin's lieutenant and a true ally of Cormin, who once helped her expose a bad suitor.
content: |
  Serves as an officer and lieutenant in Van Morgaaran Trading under Delamin Van Morgaaran.
  A true ally of Cormin: he once investigated a suitor of hers who seemed too good to be
  true, confirmed the suspicion, and helped her avoid a bad match. This earned her lasting
  loyalty.
relationships:
  - target: npc-delamin-van-morgaaran
    rel: member_of
    notes: His lieutenant in Van Morgaaran Trading
  - target: npc-cormin
    rel: ally
    notes: Cormin investigated a bad suitor for her; she is a true ally
  - target: location-oechenfor
    rel: located_in
sources:
