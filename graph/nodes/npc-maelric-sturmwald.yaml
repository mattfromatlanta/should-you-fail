id: npc-maelric-sturmwald
type: npc
name: Maelric Sturmwald
tags: [human, veteran, exarch, aris, catatonic, rebellion, psychic-trap]
status: alive
summary: Chief Exarch of the Allied Cities; fell into a catatonic trance ~2 months ago after triggering an Estaran psychic trap while trying to recover lost memories.
content: |
  Citizen Exarch based in Aris. Veteran of the Rebellion. Two months ago (mid-February) he
  entered a meditative trance to explore his subconscious and recover lost memories of fighting
  in Estaran wars on other worlds. He triggered an Estaran psychic trap—a snare laid in the
  minds of all veterans to prevent exactly this kind of investigation. He is alive but unreachable,
  lost in his own trapped consciousness.

  His catatonic state has thrown the Allied Cities into political crisis. Gallifax keeps strict
  vigil. Rumors spread: that he is dead, imprisoned, or assassinated. His throne in the Hall of
  Allies in Aris sits empty. The Veterans faction wants a Council of Regency in his name; the
  Young Bastards see his collapse as evidence the Veteran-dominated system must change.
relationships:
