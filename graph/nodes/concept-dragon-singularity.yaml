id: concept-dragon-singularity
type: concept
name: Dragon Singularity (Unary Great Wyrm)
tags: [dragon, singularity, cosmic, cetyri, milicents-plan, multiverse]
summary: A dragon who unifies all versions of their soul across realities into one impossibly powerful being—the Estarans' greatest fear.
content: |
  Dragon souls reach across realities to other versions of themselves in parallel worlds. A dragon
  who binds all versions of their soul becomes a Unary Great Wyrm—a Dragon Singularity. These
  beings are among the most powerful cosmic forces in existence and are the only things the
  Estarans genuinely fear. Varkhasia, a red great worm, nearly destroyed the Estaran Empire before
  they annihilated the Material Plane to stop him (Rebellion 44).

  The process is perilous: bringing dragon instances into proximity could fuse them into a
  stronger creature, or could cause catastrophic damage to the world where it happens. Unlike
  regular dragons, Unary Great Wyrms can be truly and permanently killed.

  Cetyri's damaged soul reaches across realities in an unusual dispersed pattern, making him
  uniquely able to safely unify with his other selves—this is the basis of Milicent's plan.
  Milicent spent a century keeping Cetyri prisoner, possibly damaging his soul in precisely the
  way needed for the singularity process.
relationships:
  - target: npc-cetyri
    rel: destined_for
    notes: Cetyri is the intended Dragon Singularity in Milicent's plan
