id: npc-torma-the-unforgiving
type: npc
name: Torma the Unforgiving
tags: [dragon, white-dragon, adult, foe, chapter-2, deceased]
status: dead
summary: Adult white dragon, mother of Gullux and Bronik; came to the Uplands seeking her stolen eggs; slain by Erol and Lamat at the end of Chapter 2.
content: |
  Adult white dragon. Mother of both Gullux (traitorous) and Bronik (loyal). Gullux betrayed her
  by stealing dragon eggs from her clutch. Sent Bronik to find the stolen treasure and eggs.
  Attacked at the end of Chapter 2 and was killed by Erol and Lamat.

  Treasure stolen by Gullux included adamantine armor and a flaming sword once owned by Garrik
  the Bold, a challenger she had defeated and killed.
relationships:
  - target: npc-gullux
    rel: family
    notes: Son; betrayed her
  - target: npc-bronik
    rel: family
    notes: Loyal son and agent
  - target: npc-erol
    rel: slain_by
  - target: npc-lamat
    rel: slain_by
sources:
