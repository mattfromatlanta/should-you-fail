    rel: family
    notes: Daughter-in-law; Caera is Aelira's mother
  - target: location-naeliste
    rel: located_in
  - target: artifact-testament-of-embers
    rel: owns
    notes: Held in her library collection
  - target: artifact-letter-from-grib
    rel: owns
  - target: artifact-ode-to-seven-lords
    rel: owns
