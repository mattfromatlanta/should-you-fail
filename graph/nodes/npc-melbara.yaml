name: Melbara
tags: [eladrin, naeliste, librarian, moon-druid, ally]
status: alive
summary: Queen Librarian of Naeliste's Library of Rhymes and Antiquities; Moon Druid; grandmother of Aelira; holds key historical documents.
content: |
  Queen Librarian and Moon Druid of Naeliste. Grandmother of Aelira (one of the party members).
  Daughter-in-law relationship to Caera. Curates the Library of Rhymes and Antiquities, which
  holds rare documents including the Testament of Embers, Grib's letter from the First War, and
  the Ode to Seven Lords. Her collection's documents provided key revelations in Chapter 3.
relationships:
