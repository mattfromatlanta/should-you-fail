summary: Human city councilor, 47; ambitious political operator publicly backing Veterans while secretly courting Young Bastards; secretly plotting to kill or have killed Chief Exarch Maelric to seize power.
content: |
  Human city councilor in Aris, age 47. An ambitious operator publicly supporting the Veterans
  faction while privately courting Young Bastard allies. Plays both sides to position himself
  as Maelric's successor.

  Secret: Looking for an opportunity to kill or have Maelric killed. Hopes to maneuver the
  current crisis into personal power.
