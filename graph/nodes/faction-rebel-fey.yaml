id: faction-rebel-fey
type: faction
name: The Rebel Fey
tags: [fey, archfey, rebel, first-war, feywild]
status: active
summary: The seven original Archfey and Beast Lords who led the first rebellion against the Estarans; five remain active.
content: |
  The seven original Rebel Fey were: Itrina, Carris, Xilo, Ozevriel, Thessa, Varuun, and
  Milicent. Ozevriel sacrificed himself so the other six could escape during the First War.
  Milicent separated from the group when she began enslaving mortals. Five remain—Itrina, Carris,
  Xilo, Thessa, and Varuun—and they are complex allies: they want Milicent's methods stopped but
  understand the debt they owe her for the Rebellion's success. They possess knowledge of the
  Shadow Projector and Cetyri's potential.

  Named members:
  - Itrina: Watches from beyond the frost, holds lost names
  - Carris: Crowned in antlers, holds lawless borders
  - Xilo (Lord of Robins): Joy beneath the thorn, taught the lost to win
  - Ozevriel: Sacrificed himself (deceased); memorial tomb exists in Feywild
  - Thessa: Walks where broken hearts grow gardens
  - Varuun: Guards places where worlds divide
  - Milicent: The fallen seventh, now the Shadowdame
relationships:
  - target: npc-milicent
    rel: former_member
    notes: Broke from the group when she began enslaving mortals
  - target: npc-xilo-lord-of-robins
    rel: member_of
  - target: npc-ozevriel
    rel: lost_member
    notes: Sacrificed himself in the First War
  - target: event-first-war
    rel: participated_in
sources:
