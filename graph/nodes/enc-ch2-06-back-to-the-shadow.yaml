name: "Ch2 E06: Back to the Shadow"
tags: [chapter-2, combat, shadow-projection, maxxa-valien, milicent, second-capture]
status: complete
summary: When the party returns to Maxxa'Valien's keep, Milicent pulls them into shadow space again to fight a transformed, weakened Maxxa'Valien—the second Shadow Projector experience.
content: |
  The party returns to Maxxa'Valien's fortress having fulfilled their end of the deal. But
  Milicent has other plans. For the second time, they are dragged into her shadow projection
  space. This time they face Maxxa'Valien—transformed, but deliberately weakened by Milicent
  to level the field against the party.

  The party defeats the transformed beholder. The encounter reinforces that Milicent is
  watching them, testing them, and engineering their trials—though her identity and motives
  remain opaque. The "Shadowdame M" reference from the kobold ruins connects.

  Monsters: Zombie Beholder, Eye Shadow variants.
