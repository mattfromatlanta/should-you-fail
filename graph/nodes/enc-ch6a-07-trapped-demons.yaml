summary: The party discovers and releases a 50-year-old arcane trap in the memorial antechamber, then defeats the 2 Arcanaloths and 5 Dire Worgs that had been locked inside.
content: |
  In the memorial's underground antechamber, the party finds a powerful arcane trap that has
  held 2 Arcanaloths and 5 Dire Worgs for fifty years. Through careful investigation and
  skillful manipulation they release the trap—then must defeat the freed creatures in combat.

  The demons and worgs were trapped long enough ago to be completely disoriented and furious.
  The party defeats all of them, clearing the memorial. Their success demonstrates competence
  in handling complex magical traps—an observation the session worksheet notes explicitly.
  (Per session worksheet: "Tactical combat to eliminate threats.")
